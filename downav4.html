<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3U8视频下载器 - 手机标签版</title>
    <script src="https://cdn.jsdelivr.net/npm/mux.js@6.0.0/dist/mux.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            color: white;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .tab-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            padding: 12px 5px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(45deg, #4a9eff, #0066ff);
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }

        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }

        .panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 14px 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .btn {
            background: linear-gradient(45deg, #4a9eff, #0066ff);
            color: white;
            border: none;
            padding: 10px 6px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin: 12px 0;
        }
        .btn-row .btn {
            flex: 1;
        }

        .btn-download { background: linear-gradient(45deg, #00c853, #009624); }
        .btn-full-download { background: linear-gradient(45deg, #00a152, #007e3d); }
        .btn-clear { background: linear-gradient(45deg, #ff5252, #b33939); }
        .btn-skip { background: linear-gradient(45deg, #ff9800, #f57c00); }
        .btn-play { background: linear-gradient(45deg, #ff4081, #c60055); }
        .btn-prev { background: linear-gradient(45deg, #9c27b0, #7b1fa2); }
        .btn-next { background: linear-gradient(45deg, #ff9800, #f57c00); }

        .progress-container {
            margin: 20px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            height: 18px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00c853, #64dd17);
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }
        .progress-text {
            position: absolute;
            right: 8px;
            top: 0;
            line-height: 18px;
            font-size: 0.75rem;
            color: white;
        }

        .status-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            min-height: 80px;
            font-family: monospace;
            overflow-y: auto;
            max-height: 150px;
        }
        .status-item {
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }

        .video-container {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
            margin-top: 15px;
            position: relative;
        }
        video { width: 100%; height: 100%; display: block; }
        .loading-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            display: flex; flex-direction:column;
            justify-content: center; align-items: center;
            z-index: 10;
        }
        .spinner {
            width:40px; height:40px;
            border:4px solid rgba(255,255,255,0.3);
            border-radius:50%;
            border-top:4px solid #4a9eff;
            animation: spin 1s linear infinite;
            margin-bottom:12px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        .info-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .info-card {
            background: rgba(0,0,0,0.3);
            border-radius:10px;
            padding:12px;
            text-align:center;
        }
        .info-value {
            font-size:1.5rem;
            font-weight:700;
            margin:8px 0;
            color:#4a9eff;
        }

        .lib-status {
            padding:8px; margin:12px 0;
            border-radius:8px;
            text-align:center;
            background:rgba(0,0,0,0.3);
            font-size:0.9rem;
        }
        .success { color:#00c853; }
        .error { color:#ff5252; }
        .warning { color:#ffd740; }

        .modal {
            display:none; position:fixed; top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.7);
            z-index:1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background:rgba(30,30,50,0.95);
            padding:20px;
            border-radius:15px;
            width:92%;
        }
        .modal-title {
            font-size:1.5rem;
            margin-bottom:15px;
            text-align:center;
            color:#4a9eff;
        }
        .modal-input {
            width:100%; padding:12px 15px;
            border-radius:8px; border:none;
            background:rgba(255,255,255,0.1);
            color:white; font-size:16px; margin-top:6px;
        }
        .modal-buttons {
            display:flex; gap:10px; justify-content:center; margin-top:15px;
        }
        .btn-modal { padding:12px 20px; flex:1; }
        .btn-cancel { background:linear-gradient(45deg,#ff5252,#b33939); }
        .btn-confirm { background:linear-gradient(45deg,#00c853,#009624); }

        .history-container {
            max-height:280px; overflow-y:auto; margin:15px 0;
        }
        .history-item {
            background:rgba(255,255,255,0.1);
            border-radius:8px; padding:12px;
            margin-bottom:10px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .history-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-right:10px; font-size:0.9rem; }
        .history-date { font-size:0.75rem; opacity:0.7; }
        .history-action { background:rgba(255,255,255,0.2); border:none; color:white; border-radius:5px; padding:5px 8px; font-size:0.8rem; cursor:pointer; }

        .id-input-group { display:grid; grid-template-columns:1fr auto; gap:10px; margin-bottom:10px; }
        .template-url { background:rgba(255,255,255,0.1); border-radius:8px; padding:10px; margin-top:12px; font-size:0.85rem; text-align:center; }
        .range-inputs { display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:15px; }
        .batch-controls { background:rgba(0,0,0,0.5); border-radius:10px; padding:15px; border:1px solid rgba(255,255,255,0.1); }
        .batch-title { font-size:1.2rem; margin-bottom:15px; text-align:center; color:#9c27b0; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.2); }

        footer {
            text-align:center; margin-top:25px; padding-top:15px;
            border-top:1px solid rgba(255,255,255,0.2);
            opacity:0.7; font-size:0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>M3U8视频下载器</h1>
        <p class="subtitle">手机标签版 · 模块化切换</p>
        <div class="lib-status" id="lib-status">正在加载视频处理库...</div>
    </header>

    <div class="tab-nav">
        <button class="tab-btn active" data-tab="tab1">下载控制台</button>
        <button class="tab-btn" data-tab="tab2">视频预览</button>
        <button class="tab-btn" data-tab="tab3">批量任务</button>
        <button class="tab-btn" data-tab="tab4">历史记录</button>
    </div>

    <div class="tab-panel active" id="tab1">
        <div class="panel">
            <h2 class="panel-title">视频下载控制台</h2>
            <div class="input-group">
                <label>视频ID（数字）</label>
                <div class="id-input-group">
                    <input type="number" id="video-id" placeholder="输入视频ID">
                    <button id="add-id-btn" class="btn">添加</button>
                </div>
                <label>历史ID</label>
                <select id="id-history"><option value="">选择历史ID</option></select>
                <div class="template-url">当前URL: https://t0.97img.com/a<span id="id-display">1000001</span>/a.m3u8</div>
            </div>

            <!-- 1.上一个、下一个、获取信息 缩文字放一行 -->
            <div class="btn-row">
                <button id="prev-btn" class="btn btn-prev">上一</button>
                <button id="fetch-btn" class="btn">获取</button>
                <button id="next-btn" class="btn btn-next">下一</button>
            </div>

            <div class="input-group">
                <label>下载部分</label>
                <select id="download-section">
                    <option value="middle">中部</option><option value="tail">尾部</option><option value="head">头部</option>
                </select>
            </div>
            <div class="input-group">
                <label>下载分片数量 (0=全部)</label>
                <input type="number" id="segment-count" value="5" min="0">
            </div>
            <div class="progress-container" id="progress-container" style="display:none;">
                <div class="progress-bar" id="progress-bar"><div class="progress-text" id="progress-text">0%</div></div>
            </div>

            <!-- 2.分段、完整、清空、历史 缩文字放一行 -->
            <div class="btn-row">
                <button id="download-btn" class="btn btn-download">分段</button>
                <button id="download-full-btn" class="btn btn-full-download">完整</button>
                <button id="clear-btn" class="btn btn-clear">清空</button>
                <button id="history-btn" class="btn">历史</button>
            </div>

            <h3 class="panel-title">操作日志</h3>
            <div class="status-box" id="status-box"><div class="status-item">等待操作...</div></div>
        </div>
    </div>

    <div class="tab-panel" id="tab2">
        <div class="panel">
            <h2 class="panel-title">视频预览</h2>
            <div class="video-container">
                <div class="loading-overlay" id="loading-overlay" style="display:none;">
                    <div class="spinner"></div><div id="loading-text">准备播放...</div>
                </div>
                <video id="video-player" controls></video>
            </div>
            <div class="info-box">
                <div class="info-card"><div class="info-label">视频时长</div><div class="info-value" id="duration">--:--</div></div>
                <div class="info-card"><div class="info-label">已下载</div><div class="info-value" id="downloaded">0</div></div>
            </div>

            <!-- 3.播放、保存、跳过 缩文字放一行 -->
            <div class="btn-row">
                <button id="play-btn" class="btn btn-play" disabled>播放</button>
                <button id="save-btn" class="btn" disabled>保存</button>
                <button id="skip-btn" class="btn btn-skip">跳过</button>
            </div>

            <h3 class="panel-title">视频信息</h3>
            <div class="status-box" id="info-box"><div class="status-item">等待获取视频信息...</div></div>
        </div>
    </div>

    <div class="tab-panel" id="tab3">
        <div class="panel">
            <div class="batch-controls">
                <div class="batch-title">批量下载设置</div>
                <div class="range-inputs">
                    <div><label>起始ID</label><input type="number" id="batch-start" value="1000001"></div>
                    <div><label>结束ID</label><input type="number" id="batch-end" value="1001001"></div>
                </div>
                <div class="range-inputs">
                    <div><label>最大时长(分钟)</label><input type="number" id="max-duration" value="25"></div>
                    <div><label>需要下载数量</label><input type="number" id="target-count" value="4"></div>
                </div>
                <div class="range-inputs">
                    <div><label>解析重试次数</label><input type="number" id="retry-count" value="10"></div>
                </div>
                <button id="batch-download-btn" class="btn btn-full" style="background:linear-gradient(45deg,#9c27b0,#7b1fa2)">开始批量下载</button>
                <div id="batch-info" style="display:none; text-align:center; margin-top:10px;">
                    进度: <span id="batch-progress">0</span>/<span id="batch-total">0</span><br>
                    已完成: <span id="batch-success">0</span>/<span id="batch-target">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-panel" id="tab4">
        <div class="panel">
            <h2 class="panel-title">历史记录管理</h2>
            <div class="status-box" id="history-list"><div class="status-item">点击下载历史查看</div></div>
            <button id="clear-history-btn" class="btn btn-clear btn-full">清空全部历史</button>
        </div>
    </div>

    <footer>
        <p>M3U8视频下载工具 手机增强版 &copy; 2025</p>
        <p>仅用于学习，请勿下载版权视频</p>
    </footer>
</div>

<div class="modal" id="filename-modal">
    <div class="modal-content">
        <h2 class="modal-title">保存视频</h2>
        <input type="text" id="filename-input" class="modal-input" value="video.mp4">
        <div class="modal-buttons">
            <button id="cancel-btn" class="btn btn-modal btn-cancel">取消</button>
            <button id="confirm-save-btn" class="btn btn-modal btn-confirm">保存</button>
        </div>
    </div>
</div>

<div class="modal" id="history-modal">
    <div class="modal-content">
        <h2 class="modal-title">下载历史</h2>
        <div class="history-container" id="history-list"></div>
        <button id="close-history-btn" class="btn btn-modal btn-confirm">关闭</button>
    </div>
</div>

<script>
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
    });
});

document.addEventListener('DOMContentLoaded', function () {
    const videoIdInput = document.getElementById('video-id');
    const idHistorySelect = document.getElementById('id-history');
    const idDisplay = document.getElementById('id-display');
    const addIdBtn = document.getElementById('add-id-btn');
    const downloadSectionSelect = document.getElementById('download-section');
    const segmentCountInput = document.getElementById('segment-count');
    const fetchBtn = document.getElementById('fetch-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const downloadBtn = document.getElementById('download-btn');
    const downloadFullBtn = document.getElementById('download-full-btn');
    const batchStartInput = document.getElementById('batch-start');
    const batchEndInput = document.getElementById('batch-end');
    const batchDownloadBtn = document.getElementById('batch-download-btn');
    const batchInfo = document.getElementById('batch-info');
    const batchProgress = document.getElementById('batch-progress');
    const batchTotal = document.getElementById('batch-total');
    const batchSuccess = document.getElementById('batch-success');
    const batchTarget = document.getElementById('batch-target');
    const maxDurationInput = document.getElementById('max-duration');
    const targetCountInput = document.getElementById('target-count');
    const retryCountInput = document.getElementById('retry-count');
    const skipBtn = document.getElementById('skip-btn');
    const playBtn = document.getElementById('play-btn');
    const saveBtn = document.getElementById('save-btn');
    const clearBtn = document.getElementById('clear-btn');
    const historyBtn = document.getElementById('history-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const progressContainer = document.getElementById('progress-container');
    const statusBox = document.getElementById('status-box');
    const infoBox = document.getElementById('info-box');
    const videoPlayer = document.getElementById('video-player');
    const durationEl = document.getElementById('duration');
    const downloadedEl = document.getElementById('downloaded');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const libStatus = document.getElementById('lib-status');
    const filenameModal = document.getElementById('filename-modal');
    const filenameInput = document.getElementById('filename-input');
    const cancelBtn = document.getElementById('cancel-btn');
    const confirmSaveBtn = document.getElementById('confirm-save-btn');
    const historyModal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    const closeHistoryBtn = document.getElementById('close-history-btn');
    const clearHistoryBtn = document.getElementById('clear-history-btn');

    let tsSegments = [];
    let downloadedSegments = [];
    let videoDuration = 0;
    let mediaSource = null;
    let downloadHistory = JSON.parse(localStorage.getItem('downloadHistory')) || [];
    let idHistory = JSON.parse(localStorage.getItem('idHistory')) || [];
    let batchDownloadActive = false;
    let batchCurrentId = 0;
    let batchEndId = 0;
    let batchSuccessCount = 0;
    // 还原最初原版跳过标记逻辑
    let batchSkipCurrent = false;

    function initIdHistory() {
        idHistorySelect.innerHTML = '<option value="">选择历史ID</option>';
        idHistory.forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = id;
            idHistorySelect.appendChild(opt);
        });
    }

    function addIdToHistory(id) {
        if (!id || idHistory.includes(id)) return;
        idHistory.push(id);
        localStorage.setItem('idHistory', JSON.stringify(idHistory));
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = id;
        idHistorySelect.appendChild(opt);
    }

    function getMaxHistoryId() {
        if (idHistory.length === 0) return "1000001";
        const nums = idHistory.map(Number).filter(n => !isNaN(n));
        return nums.length ? Math.max(...nums).toString() : "1000001";
    }

    function showDownloadHistory() {
        historyList.innerHTML = '';
        if (downloadHistory.length === 0) {
            historyList.innerHTML = '<div class="status-item" style="text-align:center;">暂无记录</div>';
            return;
        }
        downloadHistory.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="history-name">${item.name}</div>
                <div class="history-date">${new Date(item.timestamp).toLocaleString()}</div>
                <button class="history-action" data-id="${item.id}">使用</button>
            `;
            historyList.appendChild(div);
        });
        document.querySelectorAll('.history-action').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                videoIdInput.value = id;
                idDisplay.textContent = id;
                historyModal.style.display = 'none';
                addStatus(`已加载ID: ${id}`);
            });
        });
    }

    function clearDownloadHistory() {
        downloadHistory = [];
        localStorage.setItem('downloadHistory', JSON.stringify(downloadHistory));
        showDownloadHistory();
        addStatus('历史已清空', 'success');
    }

    function addStatus(msg, type = '') {
        const item = document.createElement('div');
        item.className = `status-item ${type}`;
        item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        statusBox.prepend(item);
        if (statusBox.children.length > 15) statusBox.removeChild(statusBox.lastChild);
    }

    function addVideoInfo(msg, type = '') {
        const item = document.createElement('div');
        item.className = `status-item ${type}`;
        item.textContent = msg;
        infoBox.prepend(item);
        if (infoBox.children.length > 8) infoBox.removeChild(infoBox.lastChild);
    }

    function updateProgress(p) {
        progressBar.style.width = p + '%';
        progressText.textContent = Math.round(p) + '%';
    }

    function generateM3U8Url(id) {
        return `https://t0.97img.com/a${id}/a.m3u8`;
    }

    async function fetchM3U8(url) {
        addStatus(`获取: ${url}`, 'warning');
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const txt = await res.text();
        addStatus('M3U8 获取成功', 'success');
        return txt;
    }

    function parseM3U8(txt, base) {
        const lines = txt.split('\n');
        const segs = [];
        const basePath = base.substring(0, base.lastIndexOf('/') + 1);
        let total = 0;
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const d = parseFloat(line.replace('#EXTINF:', '').split(',')[0]);
                total += d;
            }
            if (line && !line.startsWith('#') && (line.includes('.ts') || line.includes('.m4s'))) {
                segs.push(line.startsWith('http') ? line : basePath + line);
            }
        });
        const m = Math.floor(total / 60);
        const s = Math.floor(total % 60);
        videoDuration = { minutes: m, seconds: s };
        durationEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        addVideoInfo(`分片: ${segs.length} 时长: ${m}:${s < 10 ? '0' : ''}${s}`);
        return segs;
    }

    async function downloadTsSegment(url, i) {
        addStatus(`下载分片 ${i + 1}`, 'warning');
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        downloadedSegments.push({ index: i, arrayBuffer: buf });
        downloadedEl.textContent = downloadedSegments.length;
        playBtn.disabled = false;
        saveBtn.disabled = false;
        addStatus(`分片 ${i + 1} 完成`, 'success');
    }

    async function playVideo() {
        if (downloadedSegments.length === 0) { addStatus('无分片', 'error'); return; }
        loadingOverlay.style.display = 'flex';
        videoPlayer.style.display = 'none';
        if (mediaSource) {
            if (mediaSource.readyState === 'open') mediaSource.endOfStream();
            mediaSource = null;
        }
        mediaSource = new MediaSource();
        videoPlayer.src = URL.createObjectURL(mediaSource);
        mediaSource.addEventListener('sourceopen', async () => {
            const sb = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E,mp4a.40.2"');
            sb.mode = 'sequence';
            downloadedSegments.sort((a, b) => a.index - b.index);
            const transmuxer = new muxjs.mp4.Transmuxer({ keepOriginalTimestamps: true });
            let idx = 0;
            transmuxer.on('data', seg => {
                const u8 = new Uint8Array(seg.initSegment.byteLength + seg.data.byteLength);
                u8.set(seg.initSegment, 0);
                u8.set(seg.data, seg.initSegment.byteLength);
                sb.appendBuffer(u8);
            });
            function next() {
                if (idx >= downloadedSegments.length) {
                    mediaSource.endOfStream();
                    return;
                }
                loadingText.textContent = `转码 ${Math.round(idx / downloadedSegments.length * 100)}%`;
                transmuxer.push(new Uint8Array(downloadedSegments[idx++].arrayBuffer));
                transmuxer.flush();
            }
            sb.addEventListener('updateend', next);
            next();
        });
        videoPlayer.addEventListener('canplay', () => {
            loadingOverlay.style.display = 'none';
            videoPlayer.style.display = 'block';
            videoPlayer.play().catch(() => { });
        });
    }

    function saveVideo(filename) {
        if (downloadedSegments.length === 0) { addStatus('无分片', 'error'); return; }
        downloadedSegments.sort((a, b) => a.index - b.index);
        const blob = new Blob(downloadedSegments.map(s => s.arrayBuffer), { type: 'video/mp4' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        downloadHistory.unshift({ id: videoIdInput.value, name: filename, timestamp: Date.now() });
        localStorage.setItem('downloadHistory', JSON.stringify(downloadHistory));
        addStatus(`已保存: ${filename}`, 'success');
    }

    function clearCache() {
        downloadedSegments = [];
        downloadedEl.textContent = '0';
        progressContainer.style.display = 'none';
        playBtn.disabled = true;
        saveBtn.disabled = true;
        downloadBtn.disabled = true;
        downloadFullBtn.disabled = true;
        videoPlayer.pause();
        videoPlayer.src = '';
        addStatus('缓存已清空', 'success');
    }

    function getSegmentsToDownload() {
        const section = downloadSectionSelect.value;
        const cnt = parseInt(segmentCountInput.value) || 0;
        const total = tsSegments.length;
        if (cnt === 0 || cnt >= total) return tsSegments.map((u, i) => ({ url: u, index: i }));
        let start, end;
        if (section === 'head') { start = 0; end = cnt - 1; }
        else if (section === 'tail') { start = total - cnt; end = total - 1; }
        else { const mid = Math.floor(total / 2); start = mid - Math.floor(cnt / 2); end = start + cnt - 1; }
        start = Math.max(0, start);
        end = Math.min(total - 1, end);
        const arr = [];
        for (let i = start; i <= end; i++) arr.push({ url: tsSegments[i], index: i });
        return arr;
    }

    function gotoPrevVideo() {
        const curr = parseInt(videoIdInput.value);
        const prev = isNaN(curr) ? 1000001 : Math.max(1000001, curr - 1);
        videoIdInput.value = prev;
        idDisplay.textContent = prev;
        setTimeout(() => fetchBtn.click(), 300);
    }

    function gotoNextVideo() {
        const curr = parseInt(videoIdInput.value);
        const next = isNaN(curr) ? 1000002 : curr + 1;
        videoIdInput.value = next;
        idDisplay.textContent = next;
        setTimeout(() => fetchBtn.click(), 300);
    }

    // ========== 还原最初原版批量+跳过完整逻辑，无任何修改 ==========
    async function startBatchDownload() {
        const start = parseInt(batchStartInput.value);
        const end = parseInt(batchEndInput.value);
        const maxDur = parseInt(maxDurationInput.value) || 25;
        const target = parseInt(targetCountInput.value) || 4;
        const retry = parseInt(retryCountInput.value) || 10;
        if (isNaN(start) || isNaN(end) || start > end) { addStatus('ID无效', 'error'); return; }
        batchDownloadActive = true;
        batchCurrentId = start;
        batchEndId = end;
        batchSuccessCount = 0;
        batchTotal.textContent = end - start + 1;
        batchTarget.textContent = target;
        batchProgress.textContent = 0;
        batchSuccess.textContent = 0;
        batchInfo.style.display = 'block';
        batchDownloadBtn.disabled = true;
        batchDownloadBtn.textContent = '取消批量';

        while (batchDownloadActive && batchCurrentId <= end && batchSuccessCount < target) {
            const id = batchCurrentId;
            videoIdInput.value = id;
            idDisplay.textContent = id;
            batchSkipCurrent = false;
            addStatus(`处理: ${id}`);

            let ok = false;
            for (let i = 0; i < retry && !ok && batchDownloadActive && !batchSkipCurrent; i++) {
                try {
                    const url = generateM3U8Url(id);
                    const txt = await fetchM3U8(url);
                    tsSegments = parseM3U8(txt, url);
                    ok = true;
                } catch (e) {
                    addStatus(`重试 ${i + 1}`, 'error');
                    await new Promise(r => setTimeout(r, 800));
                }
            }

            if (!ok || batchSkipCurrent || !batchDownloadActive) {
                batchCurrentId++;
                batchProgress.textContent = batchCurrentId - start;
                continue;
            }

            if (videoDuration.minutes > maxDur) {
                addStatus('超时跳过', 'warning');
                batchCurrentId++;
                batchProgress.textContent = batchCurrentId - start;
                continue;
            }

            if (tsSegments.length === 0) {
                batchCurrentId++;
                batchProgress.textContent = batchCurrentId - start;
                continue;
            }

            clearCache();
            downloadedSegments = [];
            progressContainer.style.display = 'block';
            updateProgress(0);

            for (let i = 0; i < tsSegments.length; i++) {
                if (!batchDownloadActive || batchSkipCurrent) break;
                try {
                    await downloadTsSegment(tsSegments[i], i);
                    updateProgress((i + 1) / tsSegments.length * 100);
                } catch (e) {
                    addStatus('分片失败', 'error');
                }
            }

            if (batchSkipCurrent) {
                addStatus('手动跳过当前视频', 'warning');
            } else if (downloadedSegments.length > 0) {
                saveVideo(`video_${id}.mp4`);
                batchSuccessCount++;
                batchSuccess.textContent = batchSuccessCount;
            }

            batchCurrentId++;
            batchProgress.textContent = batchCurrentId - start;
            clearCache();
            await new Promise(r => setTimeout(r, 800));
        }

        batchDownloadActive = false;
        batchDownloadBtn.disabled = false;
        batchDownloadBtn.textContent = '开始批量下载';
        batchInfo.style.display = 'none';
        addStatus(`批量完成: ${batchSuccessCount} 个`, 'success');
    }

    // 跳过按钮 原版最初逻辑
    skipBtn.onclick = () => {
        batchSkipCurrent = true;
        addStatus('已标记跳过当前任务', 'warning');
    };

    initIdHistory();
    const maxId = getMaxHistoryId();
    videoIdInput.value = maxId;
    idDisplay.textContent = maxId;
    batchStartInput.value = maxId;
    batchEndInput.value = parseInt(maxId) + 1000 + '';

    addIdBtn.onclick = () => { addIdToHistory(videoIdInput.value); addStatus(`已添加ID: ${videoIdInput.value}`); };
    idHistorySelect.onchange = () => { videoIdInput.value = idHistorySelect.value; idDisplay.textContent = idHistorySelect.value; };
    videoIdInput.oninput = () => { idDisplay.textContent = videoIdInput.value || maxId; };
    prevBtn.onclick = gotoPrevVideo;
    nextBtn.onclick = gotoNextVideo;

    fetchBtn.onclick = async () => {
        const id = videoIdInput.value;
        if (!id) { addStatus('输入ID', 'error'); return; }
        addIdToHistory(id);
        try {
            const txt = await fetchM3U8(generateM3U8Url(id));
            tsSegments = parseM3U8(txt, generateM3U8Url(id));
            downloadBtn.disabled = false;
            downloadFullBtn.disabled = false;
            addStatus('准备完成', 'success');
        } catch (e) { addStatus('失败: ' + e.message, 'error'); }
    };

    downloadBtn.onclick = async () => {
        if (!tsSegments.length) { addStatus('先获取信息', 'error'); return; }
        const list = getSegmentsToDownload();
        downloadedSegments = [];
        downloadedEl.textContent = '0';
        progressContainer.style.display = 'block';
        updateProgress(0);
        playBtn.disabled = false;
        saveBtn.disabled = false;
        for (let i = 0; i < list.length; i++) {
            await downloadTsSegment(list[i].url, list[i].index);
            updateProgress((i + 1) / list.length * 100);
        }
        addStatus('分段下载完成', 'success');
    };

    downloadFullBtn.onclick = async () => {
        if (!tsSegments.length) { addStatus('先获取信息', 'error'); return; }
        downloadedSegments = [];
        downloadedEl.textContent = '0';
        progressContainer.style.display = 'block';
        updateProgress(0);
        playBtn.disabled = false;
        saveBtn.disabled = false;
        for (let i = 0; i < tsSegments.length; i++) {
            await downloadTsSegment(tsSegments[i], i);
            updateProgress((i + 1) / tsSegments.length * 100);
        }
        addStatus('完整下载完成', 'success');
    };

    playBtn.onclick = playVideo;
    saveBtn.onclick = () => { filenameInput.value = `video_${videoIdInput.value}.mp4`; filenameModal.style.display = 'flex'; };
    clearBtn.onclick = clearCache;
    historyBtn.onclick = () => { showDownloadHistory(); historyModal.style.display = 'flex'; };
    closeHistoryBtn.onclick = () => { historyModal.style.display = 'none'; };
    clearHistoryBtn.onclick = clearDownloadHistory;
    cancelBtn.onclick = () => { filenameModal.style.display = 'none'; };
    confirmSaveBtn.onclick = () => { saveVideo(filenameInput.value.trim() || 'video.mp4'); filenameModal.style.display = 'none'; };
    batchDownloadBtn.onclick = startBatchDownload;
    addStatus('工具已就绪');
});
</script>
