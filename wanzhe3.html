<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>王者荣耀皮肤管理｜移动端版</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif;}
    body{background:#f5f7fa;padding:10px;font-size:14px;}
    .box{width:100%;margin:0 auto;background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
    h2{text-align:center;color:#d92b78;margin-bottom:12px;font-size:16px;}
    .row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;padding:8px;background:#f8f0f6;border-radius:6px;}
    .tit{font-weight:bold;color:#333;width:60px;font-size:13px;}
    select,input{padding:5px 6px;border:1px solid #ccc;border-radius:4px;font-size:13px;max-width:120px;}
    button{padding:5px 8px;border:none;border-radius:4px;background:#d92b78;color:#fff;cursor:pointer;font-size:12px;white-space:nowrap;}
    .btn-gray{background:#888;}
    .btn-blue{background:#409eff;}
    /* 表格横向滚动适配手机 */
    .table-wrap{overflow-x:auto;width:100%;}
    table{min-width:600px;width:100%;border-collapse:collapse;margin-top:8px;}
    th,td{border:1px solid #eee;padding:6px 4px;text-align:center;font-size:12px;}
    th{background:#f5f5f5;}
    .panel{margin:8px 0;padding:10px;background:#edf4ff;border-radius:6px;display:none;}
    .own{color:green;font-weight:bold;}
    .not{color:red;}
    .piece{color:#e69500;}
    .p-yp{color:#666;}
    .p-bs{color:#7ccd7c;}
    .p-yz{color:#5499ff;}
    .p-ss{color:#a855f7;}
    .p-cxss{color:#ff9500;}
    .p-cs{color:#e91e63;}
    .p-cxcs{color:#ff5722;}
    .p-dc{color:#ffd700;}
    .p-ws{color:#9b30ff;}
    .edit-row{background:#fff8e8;}
    /* 移动端多选账号框缩小 */
    #batchAccSel{height:70px;width:140px;}
    /* 隐藏原生文件按钮 */
    #importFile{display:none;}
    /* 弹窗输入适配 */
    input{width:100px;}
  </style>
</head>
<body>
<div class="box">
  <h2>王者荣耀皮肤管理系统</h2>

  <div class="row">
    <span class="tit">账号</span>
    <select id="accSel"></select>
    <input type="text" id="newAcc" placeholder="新账号">
    <button onclick="saveAccount()">切换</button>
    <span id="nowAcc" style="color:#d92b78;font-size:12px;"></span>
  </div>

  <div class="row">
    <span class="tit">批量</span>
    <select id="batchAccSel" multiple></select>
    <button onclick="exportAccounts()">导出</button>
    <button class="btn-blue" onclick="importAccounts()">导入</button>
    <input type="file" id="importFile" accept=".json">
  </div>

  <div class="row">
    <span class="tit">分路</span>
    <select id="laneFilter">
      <option value="">全部</option>
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <span class="tit">英雄</span>
    <select id="heroFilter">
      <option value="">全部</option>
    </select>
  </div>

  <div class="row">
    <span class="tit">分路</span>
    <select id="addLane">
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <span class="tit">英雄</span>
    <select id="addHero"></select>
    <span class="tit">皮肤</span>
    <select id="addSkin"></select>
    <select id="addStatus">
      <option>已拥有</option>
      <option selected>未拥有</option>
      <option>碎片兑换</option>
    </select>
    <button onclick="addSkinRecord()">添加</button>
  </div>

  <div class="row">
    <button onclick="showAddHero()">新增英雄</button>
    <button onclick="showEditHero()">编辑英雄</button>
    <button onclick="showAddSkin()">新增皮肤</button>
    <button onclick="showEditSkin()">编辑皮肤</button>
  </div>

  <div class="panel" id="addHeroPanel">
    <h4 style="font-size:14px;margin-bottom:6px;">新增英雄</h4>
    <input id="newHeroName" placeholder="英雄名称">
    <select id="newHeroLane">
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <button onclick="addNewHero()">确认新增</button>
    <button class="btn-gray" onclick="hideAllPanel()">关闭</button>
  </div>

  <div class="panel" id="editHeroPanel">
    <h4 style="font-size:14px;margin-bottom:6px;">编辑英雄</h4>
    <select id="editHeroLane" onchange="refreshEditHeroByLane()">
      <option value="">全部分路</option>
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <select id="editHeroSel"></select>
    <input id="editHeroName" placeholder="新名称">
    <select id="editHeroLaneNew"></select>
    <button onclick="saveEditHero()">保存</button>
    <button class="btn-gray" onclick="hideAllPanel()">关闭</button>
  </div>

  <div class="panel" id="addSkinPanel">
    <h4 style="font-size:14px;margin-bottom:6px;">新增皮肤</h4>
    <select id="addSkinLane" onchange="refreshAddSkinHero()">
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <select id="skinHeroSelect"></select>
    <input id="newSkinName" placeholder="皮肤名">
    <select id="newSkinQuality">
      <option>原皮</option>
      <option>伴生</option>
      <option>勇者</option>
      <option>限定勇者</option>
      <option>史诗</option>
      <option>限定史诗</option>
      <option>传说</option>
      <option>限定传说</option>
      <option>典藏</option>
      <option>无双</option>
    </select>
    <button onclick="addNewSkin()">新增</button>
    <button class="btn-gray" onclick="hideAllPanel()">关闭</button>
  </div>

  <div class="panel" id="editSkinPanel">
    <h4 style="font-size:14px;margin-bottom:6px;">编辑皮肤</h4>
    <select id="editSkinLane" onchange="refreshEditSkinHero()">
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <select id="editSkinHero"></select>
    <select id="editSkinSel"></select>
    <input id="editSkinName" placeholder="新皮肤名">
    <select id="editSkinQuality">
      <option>原皮</option>
      <option>伴生</option>
      <option>勇者</option>
      <option>限定勇者</option>
      <option>史诗</option>
      <option>限定史诗</option>
      <option>传说</option>
      <option>限定传说</option>
      <option>典藏</option>
      <option>无双</option>
    </select>
    <button onclick="saveEditSkin()">保存</button>
    <button class="btn-gray" onclick="hideAllPanel()">关闭</button>
  </div>

  <div class="panel" id="editRecordPanel">
    <h4 style="font-size:14px;margin-bottom:6px;">编辑皮肤记录</h4>
    <input type="hidden" id="editRecordId">
    <select id="editRecordLane">
      <option>对抗路</option>
      <option>中路</option>
      <option>发育路</option>
      <option>游走</option>
      <option>打野</option>
    </select>
    <select id="editRecordHero" onchange="refreshEditRecordSkin()"></select>
    <select id="editRecordSkin"></select>
    <select id="editRecordStatus">
      <option>已拥有</option>
      <option>未拥有</option>
      <option>碎片兑换</option>
    </select>
    <button onclick="saveEditRecord()">保存</button>
    <button class="btn-gray" onclick="hideAllPanel()">关闭</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>分路</th>
          <th>英雄</th>
          <th>皮肤</th>
          <th>品质</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

  officialHeroData = JSON.parse(localStorage.getItem("editAllHeroData"));

let customHero = JSON.parse(localStorage.getItem("customHeroData")) || [];
let accList = JSON.parse(localStorage.getItem("wzryAccountList")) || [];
let nowAcc = "";
let skinList = [];

function getAllHero(){
  return [...officialHeroData, ...customHero];
}

function saveAllHeroToLocal(){
  localStorage.setItem("editAllHeroData", JSON.stringify(officialHeroData));
}

window.onload = function(){
  initAccountSel();
  bindLaneFilterEvent();
  bindAddLaneChange();
  refreshAllHeroSelectAll();
  hideAllPanel();
  render();
}

function initAccountSel() {
  let sel = document.getElementById("accSel");
  sel.innerHTML = `<option value="">选择账号</option>`;
  accList.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
  let batchSel = document.getElementById("batchAccSel");
  batchSel.innerHTML = "";
  accList.forEach(a => batchSel.innerHTML += `<option value="${a}">${a}</option>`);
}

function exportAccounts() {
  let sel = document.getElementById("batchAccSel");
  let selected = Array.from(sel.selectedOptions).map(o => o.value);
  if (selected.length === 0) return alert("请选择账号");
  let exportData = { accounts: selected, data: {} };
  selected.forEach(acc => {
    exportData.data[acc] = JSON.parse(localStorage.getItem("wzrySkin_" + acc)) || [];
  });
  let blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "王者皮肤备份.json";
  a.click();
  URL.revokeObjectURL(url);
  alert("导出成功");
}

function importAccounts() {
  document.getElementById("importFile").click();
}

document.getElementById("importFile").onchange = function (e) {
  let file = e.target.files[0];
  if (!file) return;
  let reader = new FileReader();
  reader.onload = function (ev) {
    try {
      let importData = JSON.parse(ev.target.result);
      if (!importData.accounts || !importData.data) return alert("文件错误");
      let repeatAccounts = importData.accounts.filter(a => accList.includes(a));
      if (repeatAccounts.length > 0) {
        if (!confirm("存在重复账号，是否覆盖？")) return alert("已取消");
      }
      importData.accounts.forEach(acc => {
        if (!accList.includes(acc)) accList.push(acc);
        localStorage.setItem("wzrySkin_" + acc, JSON.stringify(importData.data[acc] || []));
      });
      localStorage.setItem("wzryAccountList", JSON.stringify(accList));
      initAccountSel();
      alert("导入成功");
    } catch (err) {
      alert("导入失败");
    }
  };
  reader.readAsText(file);
};

function saveAccount(){
  let name = document.getElementById("newAcc").value.trim() || document.getElementById("accSel").value;
  if(!name) return alert("请填写账号");
  nowAcc = name;
  if(!accList.includes(name)){
    accList.push(name);
    localStorage.setItem("wzryAccountList",JSON.stringify(accList));
    initAccountSel();
  }
  loadUserData();
  document.getElementById("nowAcc").innerText = "当前："+nowAcc;
}
function loadUserData(){
  skinList = JSON.parse(localStorage.getItem("wzrySkin_"+nowAcc)) || [];
  render();
}
function saveUserData(){
  localStorage.setItem("wzrySkin_"+nowAcc,JSON.stringify(skinList));
}

function bindLaneFilterEvent(){
  let laneSel = document.getElementById("laneFilter");
  let heroSel = document.getElementById("heroFilter");
  laneSel.onchange = function(){
    let val = this.value;
    heroSel.innerHTML = `<option value="">全部英雄</option>`;
    let list = getAllHero();
    if(val) list = list.filter(h=>h.lane === val);
    list.forEach(h=> heroSel.innerHTML += `<option value="${h.hero}">${h.hero}</option>`);
    render();
  }
  heroSel.onchange = render;
}

function bindAddLaneChange(){
  let addLane = document.getElementById("addLane");
  addLane.onchange = updateAddHeroList;
  updateAddHeroList();
}
function updateAddHeroList(){
  let lane = document.getElementById("addLane").value;
  let list = getAllHero().filter(h=>h.lane === lane);
  let heroSel = document.getElementById("addHero");
  heroSel.innerHTML = "";
  list.forEach(h=> heroSel.innerHTML += `<option value="${h.hero}">${h.hero}</option>`);
  updateAddSkinList();
}
document.getElementById("addHero").onchange = updateAddSkinList;
function updateAddSkinList(){
  let hName = document.getElementById("addHero").value;
  let hero = getAllHero().find(x=>x.hero === hName);
  let skinSel = document.getElementById("addSkin");
  skinSel.innerHTML = "";
  if(!hero) return;
  hero.skins.forEach(s=>{
    skinSel.innerHTML += `<option value="${s.name}" data-q="${s.quality}">${s.name}</option>`;
  })
}

function addSkinRecord(){
  if(!nowAcc) return alert("先选择账号");
  let lane = document.getElementById("addLane").value;
  let hero = document.getElementById("addHero").value;
  let skinOpt = document.getElementById("addSkin");
  let skin = skinOpt.value;
  let quality = skinOpt.selectedOptions[0].dataset.q;
  let status = document.getElementById("addStatus").value;
  skinList.push({id: Date.now(),lane,hero,skin,quality,status});
  saveUserData();
  render();
}

function openEditRecord(id){
  hideAllPanel();
  let record = skinList.find(x=>x.id === id);
  if(!record) return;
  document.getElementById("editRecordId").value = id;
  document.getElementById("editRecordLane").value = record.lane;
  document.getElementById("editRecordHero").innerHTML = "";
  getAllHero().filter(h=>h.lane === record.lane).forEach(h=>{
    document.getElementById("editRecordHero").innerHTML += `<option value="${h.hero}">${h.hero}</option>`;
  });
  document.getElementById("editRecordHero").value = record.hero;
  refreshEditRecordSkin();
  document.getElementById("editRecordSkin").value = record.skin;
  document.getElementById("editRecordStatus").value = record.status;
  document.getElementById("editRecordPanel").style.display = "block";
}
function refreshEditRecordSkin(){
  let hName = document.getElementById("editRecordHero").value;
  let hero = getAllHero().find(x=>x.hero === hName);
  let skinSel = document.getElementById("editRecordSkin");
  skinSel.innerHTML = "";
  hero.skins.forEach(s=>{
    skinSel.innerHTML += `<option value="${s.name}" data-q="${s.quality}">${s.name}</option>`;
  });
}
function saveEditRecord(){
  let id = Number(document.getElementById("editRecordId").value);
  let lane = document.getElementById("editRecordLane").value;
  let hero = document.getElementById("editRecordHero").value;
  let skinOpt = document.getElementById("editRecordSkin");
  let skin = skinOpt.value;
  let quality = skinOpt.selectedOptions[0].dataset.q;
  let status = document.getElementById("editRecordStatus").value;
  let idx = skinList.findIndex(x=>x.id === id);
  if(idx > -1){
    skinList[idx] = {id,lane,hero,skin,quality,status};
    saveUserData();
    render();
    hideAllPanel();
    alert("修改成功");
  }
}

function refreshAllHeroSelectAll(){
  refreshAddSkinHero();
  refreshEditSkinHero();
  bindLaneFilterEvent();
  updateAddHeroList();
}

  let name = document.getElementById("newHeroName").value.trim();

  if(!name) return alert("输入英雄名");
  let allNames = getAllHero().map(x=>x.hero);

  localStorage.setItem("customHeroData",JSON.stringify(customHero));

function refreshEditHeroByLane(){
  let lane = document.getElementById("editHeroLane").value;
  let sel = document.getElementById("editHeroSel");
  sel.innerHTML = "";

  if(lane) list = list.filter(h=>h.lane === lane);
  list.forEach(h=> sel.innerHTML += `<option value="${h.hero}">${h.hero}</option>`);
}

function saveEditHero(){
  let oldName = document.getElementById("editHeroSel").value;
  let newName = document.getElementById("editHeroName").value.trim();
  let newLane = document.getElementById("editHeroLaneNew").value;
  if(!newName) return alert("名称不能为空");
  let allNames = getAllHero().map(x=>x.hero);
  if(allNames.includes(newName) && newName !== oldName) return alert("名字已存在");
  let offIdx = officialHeroData.findIndex(x=>x.hero === oldName);
  if(offIdx > -1){
    officialHeroData[offIdx].hero = newName;
    officialHeroData[offIdx].lane = newLane;
    saveAllHeroToLocal();
  }
  let cusIdx = customHero.findIndex(x=>x.hero === oldName);
  if(cusIdx > -1){
    customHero[cusIdx].hero = newName;
    customHero[cusIdx].lane = newLane;
    localStorage.setItem("customHeroData",JSON.stringify(customHero));
  }
  refreshAllHeroSelectAll();
  alert("修改成功");
  hideAllPanel();
}

function bindEditSkinChange(){
  let hSel = document.getElementById("editSkinHero");
  hSel.onchange = refreshEditSkinSel;
  refreshEditSkinSel();
}
function refreshEditSkinSel(){
  let hName = document.getElementById("editSkinHero").value;
  let hero = getAllHero().find(x=>x.hero === hName);
  let sSel = document.getElementById("editSkinSel");
  sSel.innerHTML = "";
  hero.skins.forEach(s=> sSel.innerHTML += `<option value="${s.name}">${s.name}</option>`);
}
function saveEditSkin(){
  let hName = document.getElementById("editSkinHero").value;
  let oldSkinName = document.getElementById("editSkinSel").value;
  let newSkinName = document.getElementById("editSkinName").value.trim();
  let newQ = document.getElementById("editSkinQuality").value;
  if(!newSkinName) return alert("输入皮肤名");
  let hero = getAllHero().find(x=>x.hero === hName);
  let repeat = hero.skins.some(s=>s.name === newSkinName && s.name !== oldSkinName);
  if(repeat) return alert("皮肤已存在");
  let sIdx = hero.skins.findIndex(s=>s.name === oldSkinName);
  if(sIdx > -1){
    hero.skins[sIdx].name = newSkinName;
    hero.skins[sIdx].quality = newQ;
    let offIdx = officialHeroData.findIndex(x=>x.hero === hName);
    if(offIdx > -1){
      officialHeroData[offIdx].skins = hero.skins;
      saveAllHeroToLocal();
    }
    let cusIdx = customHero.findIndex(x=>x.hero === hName);
    if(cusIdx > -1){
      customHero[cusIdx].skins = hero.skins;
      localStorage.setItem("customHeroData",JSON.stringify(customHero));
    }
    refreshAllHeroSelectAll();
    alert("皮肤修改成功");
    hideAllPanel();
  }
}

function addNewSkin(){
  let hName = document.getElementById("skinHeroSelect").value;
  let sName = document.getElementById("newSkinName").value.trim();
  let quality = document.getElementById("newSkinQuality").value;
  if(!sName) return alert("填写皮肤名");
  let hero = getAllHero().find(x=>x.hero === hName);
  let hasSame = hero.skins.some(s=>s.name === sName);
  if(hasSame) return alert("同名皮肤已存在");
  hero.skins.push({name:sName,quality:quality});
  let offIdx = officialHeroData.findIndex(x=>x.hero === hName);
  if(offIdx > -1){
    officialHeroData[offIdx].skins = hero.skins;
    saveAllHeroToLocal();
  }
  let cusIdx = customHero.findIndex(x=>x.hero === hName);
  if(cusIdx > -1){
    customHero[cusIdx].skins = hero.skins;
    localStorage.setItem("customHeroData",JSON.stringify(customHero));
  }
  refreshAllHeroSelectAll();
  alert("新增皮肤成功");
  hideAllPanel();
}

function getQualityClass(q){
  if(q=="原皮")return "p-yp";
  if(q=="伴生")return "p-bs";
  if(q=="勇者")return "p-yz";
  if(q=="限定勇者")return "p-cxss";
  if(q=="史诗")return "p-ss";
  if(q=="限定史诗")return "p-cxss";
  if(q=="传说")return "p-cs";
  if(q=="限定传说")return "p-cxcs";
  if(q=="典藏")return "p-dc";
  if(q=="无双")return "p-ws";
  return "";
}

function render(){
  let lane = document.getElementById("laneFilter").value;
  let hero = document.getElementById("heroFilter").value;
  let arr = skinList.filter(item=>{
    if(lane && item.lane!==lane)return false;
    if(hero && item.hero!==hero)return false;
    return true;
  });
  let html = "";
  arr.forEach(item=>{
    let qc = getQualityClass(item.quality);
    let stClass = item.status=="已拥有"?"own":item.status=="碎片兑换"?"piece":"not";
    html += `
    <tr>
      <td>${item.lane}</td>
      <td>${item.hero}</td>
      <td>${item.skin}</td>
      <td class="${qc}">${item.quality}</td>
      <td class="${stClass}">${item.status}</td>
      <td>
        <button onclick="openEditRecord(${item.id})">编</button>
        <button onclick="delRow(${item.id})">删</button>
      </td>
    </tr>`;
  });
  document.getElementById("listBody").innerHTML = html;
}
function delRow(id){
  skinList = skinList.filter(x=>x.id!==id);
  saveUserData();
  render();
}
