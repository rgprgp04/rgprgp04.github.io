<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肺系调理食疗手册</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background-color: #f2f9f4;
      color: #333;
      padding: 12px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin: 20px 0;
      color: #2d5a3d;
    }
    .header h1 {
      font-size: 22px;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: #5a7a6a;
    }
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-box input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d6e9dc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    .search-box button {
      padding: 10px 14px;
      background: #5a9a6d;
      color: white;
      border: none;
      border-radius: 10px;
    }
    .size-select {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .size-select select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .add-btn {
      width: 100%;
      padding: 11px;
      background: #3d7a4d;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
    }
    .recipe-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .recipe-card h3 {
      font-size: 17px;
      color: #2d5a3d;
      margin-bottom: 8px;
    }
    .recipe-card .tag {
      display: inline-block;
      background: #e6f7ec;
      color: #3d7a4d;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .recipe-card p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .card-btns {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .card-btns button {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
    }
    .edit { background: #f9b949; color:#333; }
    .delete { background: #f76c6c; color:white; }
    .copy { background: #5a9a6d; color:white; }
    .save-btn {
      background: #3d7a4d !important;
      color:white !important;
      display: none;
    }
    .edit-mode input, .edit-mode textarea {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .edit-mode textarea {
      min-height: 120px;
      resize: vertical;
    }
    .edit-mode .edit { display: none; }
    .edit-mode .save-btn { display: block; }
    .empty {
      text-align: center;
      padding: 50px 0;
      color: #999;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .page-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .page-bar button {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: #5a9a6d;
      color: #fff;
      font-size: 14px;
    }
    .page-bar button:disabled {
      background: #b8d8c2;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fa-solid fa-wind"></i> 肺系调理食疗手册</h1>
    <p>润肺止咳 | 化痰平喘 | 护肺养气 | 增强免疫</p>
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="搜索食谱、食材、功效">
    <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
  </div>

  <div class="size-select">
    <span>每页显示：</span>
    <select id="pageSizeSel">
      <option value="2" selected>2条</option>
    </select>
  </div>

  <button class="add-btn" id="addBtn">➕ 新增食谱</button>
  <div class="recipe-list" id="recipeList"></div>

  <div class="page-bar">
    <button id="prevBtn">上一页</button>
    <span id="pageInfo">第1页 / 共5页</span>
    <button id="nextBtn">下一页</button>
  </div>
</div>

<div class="toast" id="toast">复制成功</div>

<script>
let recipeData = JSON.parse(localStorage.getItem('lungRecipes')) || [
{
id:1,
name:"冰糖雪梨水",
material:"雪梨1个、冰糖5克、清水适量",
method:"1.雪梨洗净去核，不用去皮；2.切成小块放入锅中；3.加清水没过雪梨，大火烧开；4.转小火煮20分钟，加入冰糖再煮5分钟；5.放温饮用，润肺止咳效果最佳。",
effect:"润肺清燥、止咳化痰，适合干咳、嗓子干痒、秋冬干燥。"
},
{
id:2,
name:"百合莲子润肺粥",
material:"鲜百合20克、莲子15克、大米50克",
method:"1.莲子去芯浸泡20分钟；2.大米淘洗干净；3.下锅先煮莲子和大米30分钟；4.最后放入百合煮10分钟；5.清淡食用，润肺安神。",
effect:"养阴润肺、安神止咳，适合肺虚久咳、睡眠差。"
},
{
id:3,
name:"白萝卜蜂蜜水",
material:"白萝卜100克、蜂蜜少许、温水",
method:"1.白萝卜洗净切小块；2.加水煮15分钟至软烂；3.放温至40度以下加入蜂蜜；4.喝汤吃萝卜，化痰效果极强。",
effect:"顺气化痰、止咳平喘，适合风寒咳嗽、痰多胸闷。"
},
{
id:4,
name:"银耳百合羹",
material:"银耳1朵、百合15克、冰糖少量",
method:"1.银耳泡发去根，撕成小朵；2.加水小火煮40分钟至出胶；3.加入百合煮15分钟；4.加冰糖调味，润肺养颜。",
effect:"滋阴润肺、养胃生津，适合干咳无痰、咽喉干燥。"
},
{
id:5,
name:"陈皮生姜止咳茶",
material:"陈皮3克、生姜2片、沸水",
method:"1.陈皮洗净，生姜切片；2.沸水冲泡，焖10分钟；3.温热饮用，可反复冲泡。",
effect:"温肺散寒、化痰止咳，适合受凉咳嗽、白痰清稀。"
},
{
id:6,
name:"杏仁润肺糊",
material:"南杏仁15克、大米20克、温水",
method:"1.杏仁和大米洗净泡软；2.放入破壁机打成糊；3.倒入锅中煮沸3分钟；4.放温食用，润肺护肺。",
effect:"润肺止咳、润肠通便，适合肺燥咳嗽、老人儿童。"
},
{
id:7,
name:"冬瓜薏米清肺汤",
material:"冬瓜150克、薏米20克、瘦肉50克",
method:"1.薏米提前浸泡；2.瘦肉焯水；3.全部下锅煮40分钟；4.少量盐调味，清淡饮用。",
effect:"清热化痰、祛湿清肺，适合痰多、湿热咳嗽。"
},
{
id:8,
name:"金桔柠檬茶",
material:"金桔5颗、柠檬2片、温水",
method:"1.金桔切开压出汁；2.加柠檬片温水冲泡；3.不放糖更健康，护咽润肺。",
effect:"理气润肺、缓解咽喉不适，适合用嗓过度、干咳。"
},
{
id:9,
name:"山药润肺粥",
material:"山药100克、大米50克",
method:"1.山药去皮切块；2.大米煮20分钟后加入山药；3.再煮15分钟至黏稠；4.健脾补肺，增强体质。",
effect:"健脾益肺、增强免疫力，适合肺虚易感冒。"
},
{
id:10,
name:"川贝炖雪梨",
material:"雪梨1个、川贝粉1克、冰糖少量",
method:"1.雪梨去核挖空；2.放入川贝粉和冰糖；3.上锅隔水蒸30分钟；4.睡前吃效果最好。",
effect:"强效润肺止咳，适合久咳不止、干咳少痰。"
}
];

  let currentPage = 1;
  let filteredList = [...recipeData];
  let PAGE_SIZE = 2;

  const recipeList = document.getElementById('recipeList');
  const searchInput = document.getElementById('searchInput');
  const toast = document.getElementById('toast');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageInfo = document.getElementById('pageInfo');
  const pageSizeSel = document.getElementById('pageSizeSel');

  pageSizeSel.addEventListener('change',function(){
    PAGE_SIZE = parseInt(this.value);
    currentPage = 1;
    render();
  })

  function render() {
    const totalPage = Math.ceil(filteredList.length / PAGE_SIZE);
    if (currentPage < 1) currentPage = 1;
    if (currentPage > totalPage) currentPage = totalPage;

    const start = (currentPage - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const pageData = filteredList.slice(start, end);

    if (pageData.length === 0) {
      recipeList.innerHTML = '<div class="empty">暂无食谱，可点击新增</div>';
    } else {
      recipeList.innerHTML = pageData.map(item => `
        <div class="recipe-card" data-id="${item.id}">
          <h3><span class="name">${item.name}</span></h3>
          <span class="tag">润肺护肺</span>
          <p><strong>食材：</strong><span class="material">${item.material}</span></p>
          <p><strong>做法：</strong><span class="method">${item.method}</span></p>
          <p><strong>功效：</strong><span class="effect">${item.effect}</span></p>
          <div class="card-btns">
            <button class="edit" onclick="edit(${item.id})">编辑</button>
            <button class="save-btn" onclick="save(${item.id})">保存</button>
            <button class="delete" onclick="del(${item.id})">删除</button>
            <button class="copy" onclick="copy(${item.id})">复制</button>
          </div>
        </div>
      `).join('');
    }
    pageInfo.innerText = `第${currentPage}页 / 共${totalPage||1}页`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPage;
  }

  function search() {
    const kw = searchInput.value.trim().toLowerCase();
    if (!kw) {
      filteredList = [...recipeData];
    } else {
      filteredList = recipeData.filter(i =>
        i.name.toLowerCase().includes(kw) ||
        i.material.toLowerCase().includes(kw) ||
        i.effect.toLowerCase().includes(kw)
      );
    }
    currentPage = 1;
    render();
  }

  window.edit = function(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    card.classList.add('edit-mode');
    const item = recipeData.find(i => i.id === id);
    card.querySelector('.name').innerHTML = `<input value="${item.name}" data-f="name">`;
    card.querySelector('.material').innerHTML = `<input value="${item.material}" data-f="material">`;
    card.querySelector('.method').innerHTML = `<textarea data-f="method">${item.method}</textarea>`;
    card.querySelector('.effect').innerHTML = `<textarea data-f="effect">${item.effect}</textarea>`;
  };

  window.save = function(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    const name = card.querySelector('[data-f="name"]').value;
    const material = card.querySelector('[data-f="material"]').value;
    const method = card.querySelector('[data-f="method"]').value;
    const effect = card.querySelector('[data-f="effect"]').value;
    const idx = recipeData.findIndex(i => i.id === id);
    recipeData[idx] = { ...recipeData[idx], name, material, method, effect };
    localStorage.setItem('lungRecipes', JSON.stringify(recipeData));
    const fidx = filteredList.findIndex(i => i.id === id);
    if (fidx !== -1) filteredList[fidx] = recipeData[idx];
    card.classList.remove('edit-mode');
    render();
  };

  window.del = function(id) {
    if (!confirm('确定删除该食疗食谱吗？')) return;
    recipeData = recipeData.filter(i => i.id !== id);
    filteredList = filteredList.filter(i => i.id !== id);
    localStorage.setItem('lungRecipes', JSON.stringify(recipeData));
    render();
  };

  window.copy = function(id) {
    const i = recipeData.find(i => i.id === id);
    const text = `【${i.name}】\n食材：${i.material}\n做法：${i.method}\n功效：${i.effect}`;
    navigator.clipboard.writeText(text);
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 1500);
  };

  document.getElementById('addBtn').onclick = () => {
    const newId = recipeData.length ? Math.max(...recipeData.map(i=>i.id)) + 1 : 1;
    const newItem = { 
      id:newId, 
      name:"新润肺食谱", 
      material:"填写所需食材", 
      method:"详细分步制作流程", 
      effect:"润肺止咳、化痰护肺" 
    };
    recipeData.unshift(newItem);
    filteredList.unshift(newItem);
    localStorage.setItem('lungRecipes', JSON.stringify(recipeData));
    currentPage = 1;
    render();
    setTimeout(() => edit(newId), 100);
  };

  document.getElementById('searchBtn').onclick = search;
  searchInput.onkeyup = e => e.key === 'Enter' && search();

  prevBtn.onclick = () => {
    currentPage--;
    render();
  };
  nextBtn.onclick = () => {
    currentPage++;
    render();
  };

  render();
</script>
</body>
</html>
