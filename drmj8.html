<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>福安麻将｜每行6张牌 放大按钮信息</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;}
body{
  background:#065f46;
  padding:8px;
  margin:0;
  color:#fff;
  min-height:100vh;
}
.game-container{
  width:100%;
  max-width:100%;
}
.block{
  background:rgba(255,255,255,0.1);
  border-radius:6px;
  padding:8px;
  margin-bottom:8px;
}
/* 改动1：每行6张手牌 */
.hand-wrap{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:6px;
}
.meld-wrap,.dis-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-top:4px;
}
.label-sm{
  font-size:13px;
  opacity:0.9;
}
.tile-hand {
  width:min(60px, 15vw);
  height:min(80px, 22vw);
  flex-shrink: 0;
  border-radius:8px;
  clip-path:polygon(8% 0, 92% 0, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0 92%, 0 8%);
  transform:rotateX(6deg);
  border:2px solid transparent;
  background-clip:padding-box, border-box;
  background-origin:padding-box, border-box;
  background-image:linear-gradient(145deg,#fff,#f0f0f0),linear-gradient(#ddd,#999);
  box-shadow:inset 0 1px 4px rgba(255,255,255,0.8),0 4px 8px rgba(0,0,0,0.3);
  transition:0.2s;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-family:SimSun,serif;
  font-size:min(22px, 6vw);
}
.tile-meld, .tile-discard {
  width:min(42px, 12vw);
  height:min(58px, 16vw);
  flex-shrink: 0;
  border-radius:4px;
  clip-path:polygon(6% 0, 94% 0, 100% 6%, 100% 94%, 94% 100%, 6% 100%, 0 94%, 0 6%);
  background-image:linear-gradient(145deg,#fff,#f0f0f0),linear-gradient(#ccc,#888);
  box-shadow:inset 0 1px 3px rgba(255,255,255,0.7),0 2px 4px rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-family:SimSun,serif;
  font-size:min(14px, 4vw);
}
.tile-discard {
  filter:grayscale(40%);
  opacity:0.8;
  border:1px solid #aaa;
  pointer-events:none;
}
.tile-back{
  background:#047857;
  color:#fff;
  background-image:radial-gradient(#059669 1px,transparent 1px);
  background-size:8px 8px;
}
.tile-hand:hover{
  transform:rotateX(3deg) translateY(-3px);
  box-shadow:0 8px 14px rgba(255,220,80,0.35),0 0 6px rgba(255,220,80,0.4);
}
.tile-selected{
  transform:translateY(-6px) !important;
  box-shadow:0 12px 18px rgba(0,0,0,0.4),0 0 10px rgba(255,210,60,0.6) !important;
  border-color:#ffcc55 !important;
}
.tile-ting{box-shadow:0 0 10px #ffdd44 !important;}
@keyframes pulse{
  0%{box-shadow:0 0 4px rgba(255,220,80,0.3);}
  50%{box-shadow:0 0 16px rgba(255,220,80,0.7);}
  100%{box-shadow:0 0 4px rgba(255,220,80,0.3);}
}
.tile-new-draw{animation:pulse 1.3s infinite;}
.tile-white{
  color:#000;
  background-image:linear-gradient(135deg,#fff,#f5f5f5),linear-gradient(#ffd700,#e6b000);
}
.tile-wan{
  color:#b50000;
  background-image:linear-gradient(135deg,#fff5f5,#ffe8e8),radial-gradient(rgba(180,0,0,0.05) 2px,transparent 2px),linear-gradient(#c41818,#880000);
  background-size:100% 100%,7px 7px;
}
.tile-tiao{
  color:#007a2b;
  background-image:linear-gradient(135deg,#f2fff6,#e6f9ec),linear-gradient(to right,rgba(0,120,40,0.06) 1px,transparent 1px),linear-gradient(#009933,#006622);
  background-size:100% 100%,13px 100%;
}
.tile-tong{
  color:#924e00;
  background-image:linear-gradient(135deg,#fffbf0,#fff0da),radial-gradient(rgba(140,70,0,0.07) 2px,transparent 2px),linear-gradient(#b56c00,#7c3e00);
  background-size:100% 100%,8px 8px;
}
.log-box{
  max-height:90px;
  overflow-y:auto;
  background:#022c22;
  padding:6px;
  border-radius:4px;
  font-size:12px;
}
.tip-pop{
  background:#111827;
  border:1px solid #fbbf24;
  padding:12px;
  border-radius:6px;
  position:fixed;
  z-index:99;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;
}
.hidden{display:none !important;}
.btn-disabled{opacity:0.4;pointer-events:none;}
.ting-hint{color:#ffdd44;font-weight:bold;font-size:12px;}
.error-hint{color:#f87171;font-weight:bold;}
.win-hint{color:#4ade80;font-weight:bold;font-size:14px;}
.btn-row-center{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin:8px 0;
}
/* 改动2：放大吃碰杠胡过按钮 */
button{
  padding:16px 28px;
  border:none;
  border-radius:4px;
  font-size:32px;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
}
/* 改动3：剩余牌堆、对方打出文字放大 */
.info-line{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  font-size:14px;
}
.info-line.justify-between{
  font-size:16px;
  font-weight:500;
}
h3{
  font-size:14px;
  margin:0 0 6px 0;
}
</style>
</head>
<body>
<div class="game-container">
  <h1 class="text-center text-lg font-bold mb-2">福安麻将</h1>

  <div class="block">
    <div class="btn-row-center mb-1">
      <button onclick="initGame()" class="bg-amber-400 text-black">新对局</button>
      <button onclick="clearAllSave()" class="bg-red-500 text-white">清空存档</button>
      <button onclick="showTingInfo()" class="bg-yellow-400 text-black">查看听牌</button>
    </div>
    <div class="info-line">
      <span id="game-info">等待开局</span>
      <span>我方:<span id="my-score" class="text-amber-300 font-bold">0</span></span>
      <span>对手:<span id="opp-score" class="text-amber-300 font-bold">0</span></span>
      <span>庄家:<span id="banker-tag">我方</span></span>
      <span>连庄:<span id="lianzhuang-tag">1</span></span>
      <span class="ting-hint" id="ting-tip"></span>
    </div>
  </div>

  <div class="log-box mb-2" id="game-log"></div>

  <div class="block">
    <h3>对手手牌</h3>
    <div id="opp-hand" class="hand-wrap mb-2"></div>
    <div class="label-sm">副露</div>
    <div id="opp-meld" class="meld-wrap mb-2"></div>
    <div class="label-sm">弃牌</div>
    <div id="opp-dis" class="dis-wrap"></div>
  </div>

  <!-- 加了justify-between类放大字体 -->
  <div class="block">
    <div class="info-line justify-between mb-1">
      <span>剩余牌堆:<span id="pile-count">0</span></span>
      <span>对方打出:<span id="last-dis-tile">无</span></span>
    </div>
    <div id="operate-btn" class="btn-row-center hidden">
      <button onclick="actionChi()" class="bg-sky-500 text-white">吃</button>
      <button onclick="actionPeng()" class="bg-orange-500 text-white">碰</button>
      <button onclick="actionGangMing()" class="bg-red-500 text-white">明杠</button>
      <button onclick="actionHu()" class="bg-pink-500 text-white">胡</button>
      <button onclick="passOperate()" class="bg-gray-500 text-white">过</button>
    </div>
    <div id="selfmo-btn-box" class="btn-row-center hidden">
      <button id="btn-selfmo" onclick="actionZiMo()" class="bg-fuchsia-500 text-white">自摸胡</button>
      <button id="btn-darkgang" onclick="selfAnGangCheck()" class="bg-yellow-500 text-black">暗杠检测</button>
    </div>
  </div>

  <div class="block">
    <h3>我方手牌</h3>
    <div id="my-hand" class="hand-wrap mb-2"></div>
    <div class="label-sm">我方副露</div>
    <div id="my-meld" class="meld-wrap mb-2"></div>
    <div class="label-sm">我方弃牌</div>
    <div id="my-dis" class="dis-wrap"></div>
  </div>
</div>

<div id="float-tip" class="tip-pop hidden"></div>

<script>
const TILE_TYPES = [
  {type:'wan',num:1,text:'一万'},{type:'wan',num:2,text:'二万'},{type:'wan',num:3,text:'三万'},
  {type:'wan',num:4,text:'四万'},{type:'wan',num:5,text:'五万'},{type:'wan',num:6,text:'六万'},
  {type:'wan',num:7,text:'七万'},{type:'wan',num:8,text:'八万'},{type:'wan',num:9,text:'九万'},
  {type:'tiao',num:1,text:'一条'},{type:'tiao',num:2,text:'二条'},{type:'tiao',num:3,text:'三条'},
  {type:'tiao',num:4,text:'四条'},{type:'tiao',num:5,text:'五条'},{type:'tiao',num:6,text:'六条'},
  {type:'tiao',num:7,text:'七条'},{type:'tiao',num:8,text:'八条'},{type:'tiao',num:9,text:'九条'},
  {type:'tong',num:1,text:'一筒'},{type:'tong',num:2,text:'二筒'},{type:'tong',num:3,text:'三筒'},
  {type:'tong',num:4,text:'四筒'},{type:'tong',num:5,text:'五筒'},{type:'tong',num:6,text:'六筒'},
  {type:'tong',num:7,text:'七筒'},{type:'tong',num:8,text:'八筒'},{type:'tong',num:9,text:'九筒'},
  {type:'white',num:0,text:'白板(金)'}
];
const ALL_TILES = TILE_TYPES.flatMap(t=>[t,t,t,t]);

let game = {
  pile:[],myHand:[],oppHand:[],
  myMeld:[],oppMeld:[],
  myDis:[],oppDis:[],
  myScore:0,oppScore:0,isMyTurn:false,
  banker: false,
  round:1,
  lastTile:null,waitOperate:false,selectIndex:-1,gameOver:false,gangBonus:10,canPlayCard:true,
  tingList:[],discardRecord:[],isFirstOppDiscard:true,isTianHuCheck:false,haveDrawAfterOpp:false,
  lianZhuang:1,
  hasMingJinGang:false,hasDarkJinGang:false,
  isLiuJuChouZhuang:false
};

function randomBanker(){
  game.banker = Math.random() >= 0.5;
}
function saveGameData(){
  const obj={
    myScore:game.myScore,oppScore:game.oppScore,banker:game.banker,round:game.round,lianZhuang:game.lianZhuang
  };
  localStorage.setItem('fuAnMjSave',JSON.stringify(obj));
}
function loadGameData(){
  const s=localStorage.getItem('fuAnMjSave');
  if(!s) {
    randomBanker();
    return false;
  }
  const d=JSON.parse(s);
  game.myScore=d.myScore;
  game.oppScore=d.oppScore;
  game.banker=d.banker;
  game.round=d.round;
  game.lianZhuang = Number(d.lianZhuang) || 1;
  return true;
}
function clearAllSave(){
  localStorage.removeItem('fuAnMjSave');
  game.myScore=0;
  game.oppScore=0;
  game.round=1;
  game.lianZhuang=1;
  randomBanker();
  initGame();
  addLog('存档清空，重新随机分配本局庄家，分数清零');
}
function addLog(t){
  const log=document.getElementById('game-log');
  log.innerHTML+=`<div class="py-0.5 border-b border-emerald-800">${t}</div>`;
  log.scrollTop=log.scrollHeight;
}
function setInfo(t){document.getElementById('game-info').innerText=t;}
function updateScoreUI(){
  document.getElementById('my-score').innerText=game.myScore;
  document.getElementById('opp-score').innerText=game.oppScore;
  document.getElementById('banker-tag').innerText=game.banker?'我方':'AI对手';
  document.getElementById('lianzhuang-tag').innerText=game.lianZhuang;
  saveGameData();
}
function hideFloatTip(){document.getElementById('float-tip').classList.add('hidden');}
function showFloatTip(html){
  const tip=document.getElementById('float-tip');
  tip.innerHTML=html+'<br><button onclick="hideFloatTip()" class="bg-gray-500 px-2 rounded mt-2">关闭</button>';
  tip.classList.remove('hidden');
  setTimeout(()=>hideFloatTip(),3000);
}
function sortHand(list){
  const order={white:0,wan:1,tiao:2,tong:3};
  const arr=[...list];
  arr.sort((a,b)=>order[a.type]-order[b.type]||a.num-b.num);
  return arr;
}
function buildPile(){
  let arr=[...ALL_TILES];
  for(let i=arr.length-1;i>0;i--){
    const r=Math.floor(Math.random()*(i+1));
    [arr[i],arr[r]]=[arr[r],arr[i]];
  }
  return arr;
}
function endWaitOperate(){
  game.waitOperate=false;
  game.lastTile=null;
  game.selectIndex=-1;
  game.canPlayCard=true;
  game.isMyTurn=true;
  if(!game.banker) game.haveDrawAfterOpp=true;
  document.getElementById('last-dis-tile').innerText = '无';
}
function countWhite(list){
  return list.filter(t=>t.type==='white').length;
}
function initGame(){
  game.pile=buildPile();
  game.myHand=[];game.oppHand=[];
  game.myMeld=[];game.oppMeld=[];
  game.myDis=[];game.oppDis=[];
  game.isMyTurn=false;game.lastTile=null;
  game.waitOperate=false;game.selectIndex=-1;game.gameOver=false;game.canPlayCard=true;
  game.tingList=[];game.discardRecord=[];game.isFirstOppDiscard=true;
  game.isTianHuCheck=false;game.haveDrawAfterOpp=false;
  game.hasMingJinGang=false;game.hasDarkJinGang=false;
  game.isLiuJuChouZhuang=false;
  document.getElementById('game-log').innerHTML='';
  document.getElementById('ting-tip').innerText='';
  document.getElementById('last-dis-tile').innerText = '无';
  hideFloatTip();

  for(let i=0;i<16;i++){
    game.myHand.push(game.pile.shift());
    game.oppHand.push(game.pile.shift());
  }
  if(game.banker) game.myHand.push(game.pile.shift());
  else game.oppHand.push(game.pile.shift());

  const needMy=game.banker?17:16;
  if(game.myHand.length!==needMy){addLog(`手牌数量异常${game.myHand.length}张，重发`);initGame();return;}
  const needOpp=game.banker?16:17;
  if(game.oppHand.length!==needOpp){addLog(`对手手牌异常，重发`);initGame();return;}

  addLog(`第${game.round}局 庄家:${game.banker?'我方':'AI对手'}，我方手牌${game.myHand.length}张，当前连庄${game.lianZhuang}庄`);
  if(game.banker){
    game.isTianHuCheck=true;
    if(checkHuCan(game.myHand,game.myMeld,null)){
      addLog('<span class="win-hint">🎉天胡！庄家起手胡牌，连庄+1，倍数翻倍</span>');
      const res=calcFullFan(game.myHand,game.myMeld,true,null,true,false,true);
      game.gameOver=true;
      game.myScore += res.oppAll;
      game.oppScore -= res.oppAll;
      setInfo(`天胡胜利，三家闲家统一赔付连庄倍数分`);
      switchBanker(true);
      updateScoreUI();
      return;
    }
    game.isMyTurn=true;
    setInfo('你是庄家，点击手牌打出');
  }else{
    setInfo('AI是庄家，等待AI出牌...');
    setTimeout(()=>aiBankerFirstDiscard(),800);
  }
  updateUI();
  checkMyTing();
}
function renderTile(tile,type='hand',idx=0,selected=false,isTing=false){
  let baseClass = `tile-${tile.type}`;
  if(selected) baseClass += ' tile-selected';
  if(isTing) baseClass += ' tile-ting';
  let clickStr = '';
  if(type === 'hand') clickStr = `onclick="clickHand(${idx})"`;
  return `<div class="tile-hand ${baseClass}" ${clickStr}>${tile.text}</div>`;
}
function renderMeldTile(tile){
  return `<div class="tile-meld tile-${tile.type}">${tile.text}</div>`;
}
function updateUI(){
  document.getElementById('pile-count').innerText=game.pile.length;
  let oppHtml='';
  game.oppHand.forEach(()=>oppHtml+='<div class="tile-hand tile-back"></div>');
  document.getElementById('opp-hand').innerHTML=oppHtml;
  const sorted=sortHand(game.myHand);
  let myHtml='';
  sorted.forEach((t,i)=>{
    const isTing=game.tingList.length>0;
    myHtml += renderTile(t,'hand',i,game.selectIndex===i,isTing);
  });
  document.getElementById('my-hand').innerHTML=myHtml;

  function renderMeldGroup(meldList){
    let html = '';
    meldList.forEach(group=>{
      group.list.forEach(t=>html += renderMeldTile(t));
    });
    return html || '<span class="opacity-60">无</span>';
  }
  document.getElementById('my-meld').innerHTML=renderMeldGroup(game.myMeld);
  document.getElementById('opp-meld').innerHTML=renderMeldGroup(game.oppMeld);

  function renderDiscard(arr){
    let h='';
    arr.forEach(t=>h += `<div class="tile-discard tile-${t.type}">${t.text}</div>`);
    return h || '<span class="opacity-60">无</span>';
  }
  document.getElementById('my-dis').innerHTML=renderDiscard(game.myDis);
  document.getElementById('opp-dis').innerHTML=renderDiscard(game.oppDis);
  const opBtn=document.getElementById('operate-btn');
  const selfBtn=document.getElementById('selfmo-btn-box');
  const darkGangBtn=document.getElementById('btn-darkgang');
  let hasFour=false;
  const map={};game.myHand.forEach(x=>map[`${x.type}${x.num}`]=(map[`${x.type}${x.num}`]||0)+1);
  for(let k in map)if(map[k]===4)hasFour=true;
  if(!hasFour) darkGangBtn.classList.add('btn-disabled');
  else darkGangBtn.classList.remove('btn-disabled');
  if(game.waitOperate){
    opBtn.classList.remove('hidden');
    selfBtn.classList.add('hidden');
  }else{
    opBtn.classList.add('hidden');
    selfBtn.classList.remove('hidden');
  }
}
function clickHand(idx){
  if(game.waitOperate){
    showFloatTip('⚠️请先操作吃/碰/明杠/胡/过，再打手牌');
    return;
  }
  if(!game.banker&&!game.haveDrawAfterOpp){
    showFloatTip('⚠️闲家需等AI出牌、操作过后摸牌才能打出');
    return;
  }
  if(game.gameOver||!game.canPlayCard||!game.isMyTurn)return;
  const sorted=sortHand(game.myHand);
  const t=sorted[idx];
  const real=game.myHand.findIndex(x=>x.type===t.type&&x.num===t.num);
  if(game.selectIndex===idx){
    const out=game.myHand.splice(real,1)[0];
    game.myDis.push(out);
    game.discardRecord.push(`${out.type}${out.num}`);
    game.selectIndex=-1;
    game.canPlayCard=false;
    game.lastTile=out;
    game.isMyTurn=false;
    game.waitOperate=true;
    document.getElementById('last-dis-tile').innerText = out.text;
    addLog(`你打出${out.text}`);
    setInfo(`打出${out.text}，等待AI操作`);
    updateUI();
    checkMyTing();
    setTimeout(()=>{game.canPlayCard=true;oppAiProcess();},900);
    return;
  }
  game.selectIndex=idx;
  updateUI();
}
function passOperate(){
  if(!game.waitOperate)return;
  hideFloatTip();
  endWaitOperate();
  addLog('选择过，轮到我方摸牌');
  drawMyTile();
}
function drawMyTile(){
  if(game.pile.length<=4){
    addLog('<span class="error-hint">流局臭庄，本局无输赢，庄家连庄+1</span>');
    game.isLiuJuChouZhuang=true;
    game.gameOver=true;
    switchBanker(false);
    updateScoreUI();
    return;
  }
  const t=game.pile.shift();
  game.myHand.push(t);
  game.isMyTurn=true;
  game.selectIndex=-1;
  game.canPlayCard=true;
  addLog(`摸到${t.text}`);
  updateUI();
  checkMyTing();
  if(!game.banker&&game.isFirstOppDiscard){
    if(checkHuCan(game.myHand,game.myMeld,null)){
      addLog('<span class="win-hint">🎉地胡！闲家自摸胡，本局下庄，仅庄家叠加连庄倍数扣分</span>');
      game.gameOver=true;
      const res=calcFullFan(game.myHand,game.myMeld,true,null,false,true,false);
      game.myScore += res.other + res.bankerMul;
      game.oppScore -= (res.other + res.bankerMul);
      setInfo(`闲家自摸胡，两家闲家扣2倍底分，庄家扣2×连庄倍数分`);
      switchBanker(false);
      updateScoreUI();
      return;
    }
  }
}
function getTotalAll(hand,meldArr){
  let total = hand.length;
  meldArr.forEach(item=>{
    if(item.type==='eat'||item.type==='peng') total +=3;
    if(item.type==='minggang'||item.type==='darkgang') total +=4;
  });
  return total;
}
function isXiaoXiangGong(hand,meldArr,addOne=false){
  const total = getTotalAll(hand,meldArr) + (addOne?1:0);
  return total !== 17;
}
function checkQiDui(all){
  let white=all.filter(x=>x.type==='white').length;
  let rest=all.filter(x=>x.type!=='white');
  const map={};rest.forEach(x=>map[`${x.type}${x.num}`]=(map[`${x.type}${x.num}`]||0)+1);
  let single=0;for(let k in map)single+=map[k]%2;
  return single<=white&&all.length===17;
}
function checkNormal(all){
  let rawList=[...all];
  let whiteCount=rawList.filter(t=>t.type==='white').length;
  let realTiles=rawList.filter(t=>t.type!=='white');
  realTiles.sort((a,b)=>{
    const typeSort={wan:1,tiao:2,tong:3};
    return typeSort[a.type]-typeSort[b.type]||a.num-b.num;
  });
  function dfs(list, leftWhite, pairUsed){
    if(list.length === 0) return pairUsed;
    const first = list[0];
    if(!pairUsed){
      if(leftWhite >= 2){
        if(dfs(list, leftWhite - 2, true)) return true;
      }
      for(let i=1;i<list.length;i++){
        if(list[i].type === first.type && list[i].num === first.num){
          const newList = [...list.slice(1,i), ...list.slice(i+1)];
          if(dfs(newList, leftWhite, true)) return true;
        }
      }
    }
    const sameNum = list.filter(t=>t.type===first.type&&t.num===first.num).length;
    if(sameNum >= 3){
      const newList = list.filter(t=>!(t.type===first.type&&t.num===first.num));
      if(dfs(newList, leftWhite, pairUsed)) return true;
    }
    const h1 = list.some(t=>t.type===first.type && t.num === first.num+1);
    const h2 = list.some(t=>t.type===first.type && t.num === first.num+2);
    if(h1 && h2){
      let newList = [...list];
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num),1);
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num+1),1);
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num+2),1);
      if(dfs(newList, leftWhite, pairUsed)) return true;
    }
    if(leftWhite >= 1 && h1){
      let newList = [...list];
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num),1);
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num+1),1);
      if(dfs(newList, leftWhite - 1, pairUsed)) return true;
    }
    if(leftWhite >= 1 && h2){
      let newList = [...list];
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num),1);
      newList.splice(newList.findIndex(x=>x.type===first.type&&x.num===first.num+2),1);
      if(dfs(newList, leftWhite - 1, pairUsed)) return true;
    }
    if(leftWhite >= 2){
      if(dfs(list.slice(1), leftWhite - 2, pairUsed)) return true;
    }
    if(leftWhite > 0){
      if(dfs(list.slice(1), leftWhite - 1, pairUsed)) return true;
    }
    if(leftWhite >= 3){
      if(dfs(list, leftWhite - 3, pairUsed)) return true;
    }
    return false;
  }
  return dfs(realTiles, whiteCount, false);
}
function checkHuCan(hand,meldArr,huTile=null){
  let tempHand=[...hand];
  if(huTile) tempHand.push(huTile);
  const totalWhite = countWhite(tempHand);
  if(totalWhite === 3) return true;
  if(totalWhite ===4){
    let hasDarkGoldGang = false;
    meldArr.forEach(m=>{if(m.type==='darkgang'&&m.list.every(t=>t.type==='white')) hasDarkGoldGang=true;});
    if(!hasDarkGoldGang) return true;
  }
  if(game.hasDarkJinGang && huTile){
    return true;
  }
  if(isXiaoXiangGong(tempHand,meldArr,false)) return false;
  if(checkQiDui([...tempHand])) return true;
  return checkNormal(tempHand);
}
function getAllPossibleTiles(){return [...TILE_TYPES];}
function getAllTingCards(hand, meldArr) {
  const result = [];
  const allTileTypes = getAllPossibleTiles();
  for (const target of allTileTypes) {
    const tempHand = [...hand];
    tempHand.push(target);
    if (checkHuCan(tempHand, meldArr, null)) {
      result.push(target.text);
    }
  }
  return [...new Set(result)];
}
function checkMyTing(){
  game.tingList = [];
  const handCopy = [...game.myHand];
  const meldCopy = game.myMeld;
  game.tingList = getAllTingCards(handCopy, meldCopy);
  const tipDom = document.getElementById('ting-tip');
  if(isXiaoXiangGong(game.myHand, game.myMeld, false)){
    tipDom.innerText = `｜⚠️小相公（总牌不满足17张，本局无法胡）`;
    tipDom.className = 'ting-hint error-hint';
  }else if(game.tingList.length > 0){
    tipDom.innerText = `｜听牌:${game.tingList.join('、')}`;
    tipDom.className = 'ting-hint';
  }else{
    tipDom.innerText = '';
  }
}
function showTingInfo(){
  if(game.tingList.length===0){showFloatTip('当前未听牌');return;}
  showFloatTip(`可胡牌：${game.tingList.join(' ')}`);
}
function calcFullFan(hand,meldArr,isZiMo,huTile=null,isTianHu=false,isXianJiaHu=false,isBankerHu=false){
  let base = 1;
  let whiteTotal=countWhite([...hand,huTile?huTile:null]);
  if(whiteTotal===3) base=10;
  if(whiteTotal===4) base=20;
  let anJinGang=false;let mingJinGang=false;
  meldArr.forEach(g=>{
    if(g.type==='darkgang'&&g.list.every(t=>t.type==='white')) anJinGang=true;
    if(g.type==='minggang'&&g.list.every(t=>t.type==='white')) mingJinGang=true;
  });
  if(anJinGang||mingJinGang) base=100;
  if(isTianHu) base=0;
  let mul = game.lianZhuang;
  let res = {oppAll:0, other:0, bankerMul:0};
  if(isBankerHu){
    let total = base * mul * 3;
    res.oppAll = total;
  }else if(isXianJiaHu){
    if(isZiMo){
      res.other = base * 2;
      res.bankerMul = base * 2 * mul;
    }else{
      res.other = base;
      res.bankerMul = base * mul;
    }
  }
  return res;
}
function switchBanker(isBankerWin){
  if(isBankerWin || game.isLiuJuChouZhuang){
    game.lianZhuang += 1;
    addLog(`连庄计数+1，庄家不变，下一局倍数×${game.lianZhuang}`);
  }else{
    game.banker = !game.banker;
    game.lianZhuang = 1;
    addLog(`闲家胡牌，本局下庄，新庄倍数重置×1`);
  }
  game.round++;
  game.isLiuJuChouZhuang = false;
}
function actionHu(){
  if(!game.waitOperate||game.gameOver) return;
  const targetTile=game.lastTile;
  if(game.banker){
    if(checkHuCan(game.myHand,game.myMeld,targetTile)){
      addLog('<span class="win-hint">🎉庄家点炮胡，连庄+1，三家闲家赔付庄倍分</span>');
      game.gameOver=true;
      const res=calcFullFan(game.myHand,game.myMeld,false,targetTile,false,false,true);
      game.myScore += res.oppAll;
      game.oppScore -= res.oppAll;
      setInfo(`庄家胡牌，三家闲家统一扣连庄倍数底分`);
      switchBanker(true);
      updateScoreUI();
      return;
    }
  }else{
    if(checkHuCan(game.myHand,game.myMeld,targetTile)){
      addLog('<span class="win-hint">🎉闲家点炮胡，放炮闲家扣底分，庄家额外扣连庄倍数分，本局下庄</span>');
      game.gameOver=true;
      const res=calcFullFan(game.myHand,game.myMeld,false,targetTile,false,true,false);
      game.myScore += res.other + res.bankerMul;
      game.oppScore -= (res.other + res.bankerMul);
      setInfo(`闲家点炮胡，仅庄家承担庄倍惩罚`);
      switchBanker(false);
      updateScoreUI();
      return;
    }
  }
  showFloatTip(`无法胡牌，不满足胡牌牌型`);
}
function actionZiMo(){
  if(game.waitOperate||game.gameOver) return;
  const canHu=checkHuCan(game.myHand,game.myMeld,null);
  if(!canHu){
    showFloatTip(`无法自摸，不满足胡牌牌型`);
    return;
  }
  hideFloatTip();
  game.gameOver=true;
  if(game.banker){
    addLog('<span class="win-hint">🎉庄家自摸胡，连庄+1，三家闲家全部赔付连庄倍数分</span>');
    const res=calcFullFan(game.myHand,game.myMeld,null,null,false,false,true);
    game.myScore += res.oppAll;
    game.oppScore -= res.oppAll;
    setInfo(`庄家自摸，三家闲家同扣庄倍分`);
    switchBanker(true);
    updateScoreUI();
  }else{
    addLog('<span class="win-hint">🎉闲家自摸胡，两家闲家扣2倍底分，庄家扣2×连庄倍数分，本局下庄</span>');
    const res=calcFullFan(game.myHand,game.myMeld,null,null,false,true,false);
    game.myScore += res.other + res.bankerMul;
    game.oppScore -= (res.other + res.bankerMul);
    setInfo(`闲家自摸，庄家承担高额庄倍惩罚`);
    switchBanker(false);
    updateScoreUI();
  }
}
function getChiList(target,hand){
  const nums=hand.filter(x=>x.type===target.type).map(x=>x.num);
  const n=target.num;let res=[];
  if(n-2>=1&&nums.includes(n-1)&&nums.includes(n-2)) res.push([n-2,n-1]);
  if(n-1>=1&&nums.includes(n-1)&&nums.includes(n+1)) res.push([n-1,n+1]);
  if(n+2<=9&&nums.includes(n+1)&&nums.includes(n+2)) res.push([n+1,n+2]);
  return res;
}
function doChi(nums){
  hideFloatTip();
  const out=game.lastTile;
  let hand=[...game.myHand];
  const meld=[out];
  nums.forEach(num=>{
    const i=hand.findIndex(x=>x.type===out.type&&x.num===num);
    meld.unshift(hand.splice(i,1)[0]);
  });
  game.myHand=hand;
  game.myMeld.push({type:'eat', list:meld});
  addLog(`吃${meld.map(x=>x.text).join('')}`);
  endWaitOperate();
  updateUI();
  checkMyTing();
}
function actionChi(){
  if(!game.waitOperate) return;
  const out=game.lastTile;
  const list=getChiList(out,game.myHand);
  if(list.length===0){showFloatTip('无法吃这张牌');return;}
  let html='可吃搭子：';
  list.forEach(g=>{
    const s=g.map(n=>out.type==='wan'?n+'万':out.type==='tiao'?n+'条':n+'筒').join('');
    html+=`<button onclick="doChi([${g}])" class="bg-sky-400 mx-1 px-2 rounded text-black">${s}</button>`;
  });
  showFloatTip(html);
}
function actionPeng(){
  if(!game.waitOperate) return;
  const out=game.lastTile;
  const same=game.myHand.filter(x=>x.type===out.type&&x.num===out.num);
  if(same.length<2){showFloatTip('手牌不足两张，不能碰');return;}
  hideFloatTip();
  const meld=[out];let cnt=0;
  game.myHand=game.myHand.filter(x=>{
    if(x.type===out.type&&x.num===out.num&&cnt<2){meld.push(x);cnt++;return false;}
    return true;
  });
  game.myMeld.push({type:'peng', list:meld});
  addLog(`碰${out.text}`);
  endWaitOperate();
  updateUI();
  checkMyTing();
}
function actionGangMing(){
  if(!game.waitOperate) return;
  const out=game.lastTile;
  const same=game.myHand.filter(x=>x.type===out.type&&x.num===out.num);
  if(same.length<3){showFloatTip('手牌不足三张，无法明杠');return;}
  hideFloatTip();
  const meld=[out];let cnt=0;
  game.myHand=game.myHand.filter(x=>{
    if(x.type===out.type&&x.num===out.num&&cnt<3){meld.push(x);cnt++;return false;}
    return true;
  });
  game.myMeld.push({type:'minggang', list:meld});
  if(out.type==='white') game.hasMingJinGang = true;
  addLog(`明杠${meld.map(x=>x.text).join('')}，牌尾补一张`);
  endWaitOperate();
  drawMyTile();
}
function selfAnGangCheck(){
  const map={};
  game.myHand.forEach(x=>map[`${x.type}${x.num}`]=(map[`${x.type}${x.num}`]||0)+1);
  let gangKey = null;
  for(let k in map){
    if(map[k]===4){gangKey = k;break;}
  }
  if(!gangKey){showFloatTip('无四张相同牌，不能暗杠');return;}
  const type = gangKey.slice(0,-1);
  const num = Number(gangKey.slice(-1));
  const tileObj = TILE_TYPES.find(t=>t.type===type&&t.num===num);
  const list = [];
  for(let i=0;i<4;i++){
    const idx = game.myHand.findIndex(x=>x.type===type&&x.num===num);
    list.push(game.myHand.splice(idx,1)[0]);
  }
  game.myMeld.push({type:'darkgang', list:list});
  if(type==='white') game.hasDarkJinGang = true;
  addLog(`暗杠${tileObj.text}四张，牌尾补一张`);
  updateUI();
  checkMyTing();
  drawMyTile();
}
function aiCalcTing(hand,meldArr){
  const candidates=[];
  hand.forEach((t,i)=>{
    const tmp=hand.filter((_,idx)=>idx!==i);
    getAllPossibleTiles().forEach(h=>{
      if(checkHuCan(tmp,meldArr,h)) candidates.push(i);
    });
  });
  return [...new Set(candidates)];
}
function aiGetSafeTile(){
  const safe=[];
  game.discardRecord.forEach(k=>{
    const t=k.slice(0,-1),n=Number(k.slice(-1));
    const find=TILE_TYPES.find(x=>x.type===t&&x.num===n);
    if(find) safe.push(find);
  });
  return safe;
}
function aiBankerFirstDiscard(){
  if(game.gameOver) return;
  const safeTiles=aiGetSafeTile();
  const tingIdx=aiCalcTing(game.oppHand,game.oppMeld);
  let dropIdx=-1;
  for(let i=0;i<game.oppHand.length;i++){
    const card=game.oppHand[i];
    if(card.type==='white') continue;
    if(safeTiles.some(s=>s.type===card.type&&s.num===card.num)){dropIdx=i;break;}
  }
  if(dropIdx===-1){
    for(let i=0;i<game.oppHand.length;i++){
      const card=game.oppHand[i];
      if(card.type==='white') continue;
      if(!tingIdx.includes(i)){dropIdx=i;break;}
    }
  }
  if(dropIdx===-1){
    for(let i=0;i<game.oppHand.length;i++){
      const card=game.oppHand[i];
      if(card.type==='white') continue;
      dropIdx=i;break;
    }
  }
  if(dropIdx===-1){
    for(let i=0;i<game.oppHand.length;i++){
      if(game.oppHand[i].type==='white'){dropIdx=i;break;}
    }
  }
  const out=game.oppHand.splice(dropIdx,1)[0];
  game.oppDis.push(out);
  game.lastTile=out;
  game.waitOperate=true;
  game.isFirstOppDiscard=false;
  document.getElementById('last-dis-tile').innerText = out.text;
  setInfo(`AI庄家打出${out.text}，你可吃/碰/明杠/胡`);
  addLog(`AI庄家打出${out.text}`);
  updateUI();
}
function oppAiProcess(){
  if(game.gameOver) return;
  const out=game.lastTile;
  const playerCanHu=checkHuCan(game.myHand,game.myMeld,out);
  if(playerCanHu){
    addLog(`AI打出${out.text}，你可点击胡牌`);
    setInfo(`AI打出${out.text}，可胡`);
  }
  const sameCnt=game.oppHand.filter(x=>x.type===out.type&&x.num===out.num).length;
  if(sameCnt>=3){
    const meld=[out];let cnt=0;
    game.oppHand=game.oppHand.filter(x=>{
      if(x.type===out.type&&x.num===out.num&&cnt<3){meld.push(x);cnt++;return false;}
      return true;
    });
    game.oppMeld.push({type:'minggang', list:meld});
    game.oppScore += game.gangBonus;
    addLog(`AI明杠${out.text}`);
    setTimeout(()=>oppAiDraw(),600);
    updateUI();
    return;
  }
  if(sameCnt>=2){
    const meld=[out];let cnt=0;
    game.oppHand=game.oppHand.filter(x=>{
      if(x.type===out.type&&x.num===out.num&&cnt<2){meld.push(x);cnt++;return false;}
      return true;
    });
    game.oppMeld.push({type:'peng', list:meld});
    addLog(`AI碰${out.text}`);
    setTimeout(()=>oppAiDraw(),600);
    updateUI();
    return;
  }
  addLog('AI选择过，AI摸牌');
  oppAiDraw();
}
function oppAiDraw(){
  if(game.pile.length<=4){
    addLog('<span class="error-hint">流局臭庄，无输赢，庄家连庄+1</span>');
    game.isLiuJuChouZhuang=true;
    game.gameOver=true;
    switchBanker(false);
    updateScoreUI();
    return;
  }
  const t=game.pile.shift();
  game.oppHand.push(t);
  if(checkHuCan(game.oppHand,game.oppMeld,null)){
    game.gameOver=true;
    addLog(`<span class="win-hint">AI自摸胡（闲家胡），本局下庄，庄家承担连庄倍数惩罚</span>`);
    const res=calcFullFan(game.oppHand,game.oppMeld,true,null,false,true,false);
    game.myScore -= (res.other + res.bankerMul);
    game.oppScore += (res.other + res.bankerMul);
    setInfo(`闲家自摸，我方庄家扣除2×连庄倍数底分`);
    switchBanker(false);
    updateScoreUI();
    return;
  }
  const safeTiles=aiGetSafeTile();
  const tingIdx=aiCalcTing(game.oppHand,game.oppMeld);
  let dropIdx=-1;
  for(let i=0;i<game.oppHand.length;i++){
    const card=game.oppHand[i];
    if(card.type==='white') continue;
    if(safeTiles.some(s=>s.type===card.type&&s.num===card.num)){dropIdx=i;break;}
  }
  if(dropIdx===-1){
    for(let i=0;i<game.oppHand.length;i++){
      const card=game.oppHand[i];
      if(card.type==='white') continue;
      if(!tingIdx.includes(i)){dropIdx=i;break;}
    }
  }
  if(dropIdx===-1){
    for(let i=0;i<game.oppHand.length;i++){
      const card=game.oppHand[i];
      if(card.type==='white') continue;
      dropIdx=i;break;
    }
  }
  if(dropIdx===-1){
    for(let i=0;i<game.oppHand.length;i++){
      if(game.oppHand[i].type==='white'){dropIdx=i;break;}
    }
  }
  const out=game.oppHand.splice(dropIdx,1)[0];
  game.oppDis.push(out);
  game.lastTile=out;
  game.waitOperate=true;
  game.isFirstOppDiscard=false;
  document.getElementById('last-dis-tile').innerText = out.text;
  setInfo(`AI打出${out.text}，你可吃/碰/明杠/胡`);
  addLog(`AI打出${out.text}`);
  updateUI();
}

window.onload=()=>{
  loadGameData();
  initGame();
}
