<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>福安白板金麻将 修复金将/金顺/金杠</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#065f46; padding:6px; margin:0;color:#fff;font-size:14px;}
.tile-hand {
  width:min(48px, 22vw);
  height:min(66px, 30vw);
  flex-shrink: 0;
  border-radius:8px;
  clip-path:polygon(8% 0, 92% 0, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0 92%, 0 8%);
  transform:rotateX(6deg);
  border:2px solid transparent;
  background-image:linear-gradient(145deg,#fff,#f0f0f0),linear-gradient(#ddd,#999);
  background-clip:padding-box, border-box;
  background-origin:padding-box, border-box;
  box-shadow:inset 0 2px 4px rgba(255,255,255,0.8),0 4px 8px rgba(0,0,0,0.3);
  transition:0.15s;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-family:"SimSun",serif;
  font-size:min(18px, 7vw);
  margin:2px;
}
.tile-hand-fresh {
  animation: freshGlow 1.2s ease-in-out infinite alternate;
}
@keyframes freshGlow {
  from { 
    box-shadow: 0 0 8px 3px #fef08a, inset 0 2px 4px rgba(255,255,255,0.8),0 4px 8px rgba(0,0,0,0.3);
    border-color: #ffd700 !important;
  }
  to { 
    box-shadow: 0 0 16px 6px #facc15, inset 0 2px 4px rgba(255,255,255,0.8),0 4px 8px rgba(0,0,0,0.3);
    border-color: #ffb700 !important;
  }
}
.tile-meld {
  width:min(32px, 12vw);
  height:min(44px, 16vw);
  flex-shrink: 0;
  border-radius:4px;
  clip-path:polygon(6% 0, 94% 0, 100% 6%, 100% 94%, 94% 100%, 6% 100%, 0 94%, 0 6%);
  background-image:linear-gradient(145deg,#fff,#f0f0f0),linear-gradient(#ccc,#999);
  background-clip:padding-box, border-box;
  box-shadow:inset 0 1px 3px rgba(255,255,255,0.7),0 2px 4px rgba(0,0,0,0.2);
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:bold;font-family:"SimSun",serif;font-size:min(11px, 4vw);margin:1px;
}
.tile-hu-add {
  border:2px solid #f83;
  box-shadow:0 0 8px #f83 !important;
}
.tile-discard {
  width:min(32px, 12vw);
  height:min(44px, 16vw);
  flex-shrink: 0;
  border-radius:4px;
  filter:grayscale(40%);opacity:0.8;
  border:1px solid #aaa;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:bold;font-family:"SimSun",serif;font-size:min(11px, 4vw);margin:1px;
  pointer-events:none;
}
.tile-back{
  background:#047857;
  color:#fff;
  background-image:radial-gradient(#059669 1px,transparent 1px);
  background-size:7px 7px;
}
.tile-hand:active{
  transform:rotateX(2deg) translateY(-3px);
  box-shadow:0 8px 12px rgba(255,220,80,0.35),0 0 6px rgba(255,220,80,0.4);
}
.tile-selected{
  transform:translateY(-8px) rotateX(6deg) !important;
  box-shadow:0 10px 16px rgba(0,0,0,0.4),0 0 12px rgba(255,210,96,0.6) !important;
  border-color:#ffcc55 !important;
}
.tile-ting{box-shadow:0 0 10px #ffdd44 !important;}
.tile-joker{background:#fffbe0;color:#c99000;border-color:#ffd700;}
.tile-wan{
  color:#b50000;
  background-image:linear-gradient(135deg,#fff5f5,#ffe8e8),radial-gradient(rgba(180,0,0,0.05) 2px,transparent 2px),linear-gradient(#c41818,#880000);
  background-size:100% 100%,6px 6px;
}
.tile-tiao{
  color:#007a2b;
  background-image:linear-gradient(135deg,#f2fff6,#e6f9ec),linear-gradient(to right,rgba(0,120,40,0.06) 1px,transparent 1px),linear-gradient(#009933,#006622);
  background-size:100% 100%,11px 100%;
}
.tile-tong{
  color:#924e00;
  background-image:linear-gradient(135deg,#fffbf0,#fff0da),radial-gradient(rgba(140,70,0,0.07) 2px,transparent 2px),linear-gradient(#b56c00,#7c3e00);
  background-size:100% 100%,7px 7px;
}
.log-box{max-height:120px;overflow-y:auto;background:#022c22;padding:6px;border-radius:4px;font-size:12px;}
.tip-pop{background:#111827;border:1px solid #fbbf24;padding:10px;border-radius:6px;margin:4px 0;position:fixed;z-index:999;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:360px;max-height:80vh;overflow-y:auto;}
.hidden{display:none !important;}
.btn-disabled{opacity:0.35;pointer-events:none;}
.ting-hint{color:#ffdd44;font-weight:bold;font-size:13px;}
.error-hint{color:#f87171;font-weight:bold;}
.win-hint{color:#4ade80;font-weight:bold;font-size:16px;}
#my-hand,#opp-hand,#my-discard,#opp-discard,#my-meld,#opp-meld {
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  align-items:center;
}
section{margin-bottom:10px; padding:8px !important;border-radius:6px;}
.control-bar,.operate-bar{display:flex; flex-wrap:wrap; gap:5px; justify-content:center;}
.operate-bar{margin-top:6px;}
button{padding:6px 10px;font-size:13px;border-radius:5px;border:none;font-weight:bold;color:#000;}
h1{font-size:18px;margin:6px 0;}
h3{font-size:14px;margin:0 0 6px 0;}
#fresh-tip{color:#fef08a;font-weight:bold;}
#ai-diff {
  background:#222;
  color:#fff;
  border:1px solid #aaa;
}
#ai-diff option {
  background:#222;
  color:#fff;
}
.record-item {
  border-bottom:1px solid #444;
  padding:6px 0;
  font-size:12px;
}
</style>
</head>
<body>
<div class="max-w-lg mx-auto">
  <h1 class="text-center font-bold">福安16张白板金麻将</h1>
  <div class="bg-emerald-800 px-2 py-2 rounded mb-2">
    <div class="control-bar mb-1">
      <button onclick="initGame()" class="bg-amber-400">新开局</button>
      <button onclick="showWinRecord()" class="bg-sky-500 text-white">胡牌记录</button>
      <button onclick="clearAllSave()" class="bg-red-400 text-white">清空存档</button>
      <select id="ai-diff" onchange="setAiDiff(this.value)" class="rounded px-1">
        <option value="easy">简单AI</option>
        <option value="normal" selected>标准AI</option>
        <option value="hard">困难AI</option>
      </select>
    </div>
    <div class="flex flex-wrap gap-1 text-xs items-center">
      <span id="game-info">等待开局</span>
      <span>我:<span id="my-score" class="ting-hint font-bold">0</span></span>
      <span>AI:<span id="ai-score" class="ting-hint font-bold">0</span></span>
      <span>庄:<span id="bank-tag">我方</span></span>
      <span>连庄×<span id="lian-tag">1</span></span>
      <span class="ting-hint ml-1" id="ting-tip"></span>
    </div>
  </div>
  <div class="log-box mb-2" id="game-log"></div>

  <section class="bg-emerald-800/60">
    <h3>对手手牌</h3>
    <div id="opp-hand" class="min-h-[60px] mb-1"></div>
    <div class="flex flex-wrap gap-3">
      <div class="flex-1 min-w-[120px]">副露:<div id="opp-meld" class="min-h-[40px]"></div></div>
      <div class="flex-1 min-w-[120px]">弃牌:<div id="opp-discard" class="min-h-[40px]"></div></div>
    </div>
  </section>

  <section class="bg-emerald-900 my-2">
    <div class="flex justify-between items-center text-xs mb-1">
      <div>剩余:<span id="pile-count">0</span></div>
      <div id="fresh-tip"></div>
      <div>AI打出:<span id="last-out">无</span></div>
    </div>
    <div class="operate-bar" id="operate-btn">
      <button id="btn-eat" onclick="actionEat()" class="bg-sky-400 text-white">吃牌</button>
      <button id="btn-peng" onclick="actionPeng()" class="bg-orange-400 text-white">碰牌</button>
      <button id="btn-minggang" onclick="actionMingGang()" class="bg-red-400 text-white">明杠</button>
      <button id="btn-hu" onclick="actionHu()" class="bg-fuchsia-500 text-white">胡牌</button>
      <button id="btn-pass" onclick="actionPass()" class="bg-gray-400">过牌</button>
    </div>
    <div class="operate-bar mt-1" id="self-btn">
      <button id="btn-zimo" onclick="actionZiMo()" class="bg-fuchsia-600 text-white">自摸</button>
      <button id="btn-angang" onclick="checkAnGang()" class="bg-yellow-400">暗杠检测</button>
      <button onclick="showTingInfo()" class="bg-yellow-400">查看听牌</button>
    </div>
  </section>

  <section class="bg-emerald-800/60">
    <h3>我方手牌</h3>
    <div id="my-hand" class="min-h-[60px] mb-1"></div>
    <div class="flex flex-wrap gap-3">
      <div class="flex-1 min-w-[120px]">我方副露:<div id="my-meld" class="min-h-[40px]"></div></div>
      <div class="flex-1 min-w-[120px]">我方弃牌:<div id="my-discard" class="min-h-[40px]"></div></div>
    </div>
  </section>
</div>
<div class="tip-pop hidden" id="float-tip"></div>

<script>
// ======================== 常量与工具 ========================
const TILE_LIST = [
  {type:'wan',num:1,text:'一万'},{type:'wan',num:2,text:'二万'},{type:'wan',num:3,text:'三万'},
  {type:'wan',num:4,text:'四万'},{type:'wan',num:5,text:'五万'},{type:'wan',num:6,text:'六万'},
  {type:'wan',num:7,text:'七万'},{type:'wan',num:8,text:'八万'},{type:'wan',num:9,text:'九万'},
  {type:'tiao',num:1,text:'一条'},{type:'tiao',num:2,text:'二条'},{type:'tiao',num:3,text:'三条'},
  {type:'tiao',num:4,text:'四条'},{type:'tiao',num:5,text:'五条'},{type:'tiao',num:6,text:'六条'},
  {type:'tiao',num:7,text:'七条'},{type:'tiao',num:8,text:'八条'},{type:'tiao',num:9,text:'九条'},
  {type:'tong',num:1,text:'一筒'},{type:'tong',num:2,text:'二筒'},{type:'tong',num:3,text:'三筒'},
  {type:'tong',num:4,text:'四筒'},{type:'tong',num:5,text:'五筒'},{type:'tong',num:6,text:'六筒'},
  {type:'tong',num:7,text:'七筒'},{type:'tong',num:8,text:'八筒'},{type:'tong',num:9,text:'九筒'},
  {type:'joker',num:0,text:'白板'}
];
let ALL_TILES = [];
TILE_LIST.forEach(t=>{ALL_TILES.push(structuredClone(t),structuredClone(t),structuredClone(t),structuredClone(t));});

const AI_WEIGHT = {
  easy: {jokerLock:999999,safe:3,edge:-2,lone:-3,split:-10,color:2,pengpeng:2,danger:-8,eatRate:0.15,gangRate:0.3,avoidDanger:1},
  normal:{jokerLock:999999,safe:10,edge:-7,lone:-6,split:-25,color:9,pengpeng:9,danger:-25,eatRate:0.45,gangRate:0.65,avoidDanger:2},
  hard:  {jokerLock:999999,safe:22,edge:-16,lone:-12,split:-70,color:18,pengpeng:18,danger:-60,eatRate:0.85,gangRate:0.95,avoidDanger:4}
};
let curAiWeight = AI_WEIGHT.normal;
function setAiDiff(v){curAiWeight=AI_WEIGHT[v];addLog(`切换AI难度：${v==='easy'?'简单':v==='normal'?'标准':'困难'}`);}

const JOKER = 'joker';
const GANG_BASE_SCORE = 10;
const DELAY_OP = 700;
const DELAY_MELD = 600;
const STREAM_LIMIT = 8;
const TIP_DURATION = 1200;

let gameData = {
  pile:[],myHand:[],oppHand:[],myMeld:[],oppMeld:[],myDiscard:[],oppDiscard:[],
  myScore:0,oppScore:0,isMyTurn:false,bank:true,round:1,lian:1,lastOut:null,waitOperate:false,
  selectIdx:-1,gameOver:false,gangScore:GANG_BASE_SCORE,canPlay:true,tingList:[],
  discardRecord:[],firstOppOut:true,tianHuCheck:false,afterDraw:false,liuJuChouZhuang:false,
  afterGang:false,totalMingGang:0,totalAnGang:0,freshTipIdx:-1
};
let winRecordList = [];

function randomBank(){gameData.bank = Math.random()>=0.5;}
function buildPile(){
  let arr = structuredClone(ALL_TILES);
  for(let i=arr.length-1;i>0;i--){
    let r = Math.floor(Math.random()*(i+1));
    [arr[i],arr[r]] = [arr[r],arr[i]];
  }
  return arr;
}
function sortHandVisual(list){
  const ord = {wan:1,tiao:2,tong:3,joker:4};
  return structuredClone(list).sort((a,b)=>{
    if(ord[a.type]!==ord[b.type]) return ord[a.type]-ord[b.type];
    return a.num - b.num;
  });
}
function countFixedMeld(meld){
  let c = 0;
  meld.forEach(() => c += 1);
  return c;
}
function calcAllTotal(hand,meldArr){
  let total = hand.length;
  meldArr.forEach(m=>total+=3);
  return total;
}
function getAllTile(){return structuredClone(TILE_LIST);}
function countJoker(arr){return arr.filter(t=>t.type===JOKER).length;}

function getMeldText(meldList){
  let str = "";
  meldList.forEach(g=> str += g.list.map(t=>t.text).join("") + " ");
  return str.trim() || "无";
}
function renderMeldHtml(meldList){
  let html = "";
  meldList.forEach(g=>{
    g.list.forEach(t=>html += `<div class="tile-meld tile-${t.type}" style="width:24px;height:34px;font-size:9px">${t.text}</div>`)
  })
  return html || "<span class='text-gray-400'>无副露</span>";
}

function saveGame(){
  const saveObj = {
    myScore:gameData.myScore,oppScore:gameData.oppScore,bank:gameData.bank,
    round:gameData.round,lian:gameData.lian,totalMingGang:gameData.totalMingGang,totalAnGang:gameData.totalAnGang,
    winRecords: winRecordList
  };
  localStorage.setItem('mahjong_save',JSON.stringify(saveObj));
}
function loadGame(){
  let s = localStorage.getItem('mahjong_save');
  if(!s){randomBank();return false;}
  let d = JSON.parse(s);
  gameData.myScore=d.myScore;gameData.oppScore=d.oppScore;gameData.bank=d.bank;
  gameData.round=d.round;gameData.lian=Number(d.lian)||1;
  gameData.totalMingGang=Number(d.totalMingGang)||0;gameData.totalAnGang=Number(d.totalAnGang)||0;
  if(d.winRecords) winRecordList = d.winRecords;
  return true;
}
function clearAllSave(){
  localStorage.removeItem('mahjong_save');
  gameData.myScore=0;gameData.oppScore=0;gameData.round=1;gameData.lian=1;
  gameData.totalMingGang=0;gameData.totalAnGang=0;
  winRecordList = [];
  randomBank();
  initGame();
  addLog('存档已清空，重新开局');
}
function showWinRecord(){
  if(winRecordList.length === 0) {
    showTip("暂无胡牌记录");
    return;
  }
  let html = "<h3 class='text-lg font-bold mb-2'>全部胡牌记录</h3>";
  winRecordList.forEach((rec,idx)=>{
    html += `
    <div class="record-item">
      <div>第${idx+1}局｜庄家：${rec.isBank?"我方":"AI"}｜${rec.huType}</div>
      <div>番型：${rec.fanText}</div>
      <div>得分：我方${rec.myScoreChange > 0 ? "+"+rec.myScoreChange : rec.myScoreChange}</div>
      <div>完整胡牌手牌(含进张)：${rec.fullHandText}</div>
      <div>副露：${rec.meldText}</div>
    </div>
    `;
  });
  html += `<button onclick="hideTip()" class="bg-gray-500 w-full mt-2 py-1 rounded">关闭</button>`;
  showTip(html);
}

function addLog(text){
  let logDom = document.getElementById('game-log');
  logDom.innerHTML += `<div class="py-0.5 border-b border-emerald-700">${text}</div>`;
  logDom.scrollTop = logDom.scrollHeight;
}
function setInfo(text){document.getElementById('game-info').innerText = text;}
function updateScoreBar(){
  document.getElementById('my-score').innerText = gameData.myScore;
  document.getElementById('ai-score').innerText = gameData.oppScore;
  document.getElementById('bank-tag').innerText = gameData.bank?'我方':'AI';
  document.getElementById('lian-tag').innerText = gameData.lian||1;
  saveGame();
}
function hideTip(){
  document.getElementById('float-tip').classList.add('hidden');
  if(gameData.gameOver){
    setTimeout(()=>initGame(), 300);
  }
}
function showTip(html){
  let dom = document.getElementById('float-tip');
  dom.innerHTML = html+'<br><button onclick="hideTip()" class="bg-gray-500 w-full mt-2 py-1 rounded">关闭</button>';
  dom.classList.remove('hidden');
}

function showWinTip(isAi,scoreText,fanText,huType,huAddTile=null){
  let title = isAi?"AI胡牌！":"恭喜你胡牌！";
  let originHand = isAi ? gameData.oppHand : gameData.myHand;
  let meldList = isAi ? gameData.oppMeld : gameData.myMeld;
  let fullHand = structuredClone(originHand);
  if(huAddTile) fullHand.push(structuredClone(huAddTile));
  let sortedFull = sortHandVisual(fullHand);

  let handTileHtml = "";
  let fullHandText = "";
  sortedFull.forEach(t=>{
    let extraCls = (huAddTile && t.type===huAddTile.type && t.num===huAddTile.num) ? "tile-hu-add" : "";
    handTileHtml += `<div class="tile-hand tile-${t.type} ${extraCls}" style="width:36px;height:50px;font-size:14px">${t.text}</div>`;
    fullHandText += t.text+" ";
  });
  fullHandText = fullHandText.trim();

  let meldTileHtml = renderMeldHtml(meldList);
  let meldText = getMeldText(meldList);

  const record = {
    round: gameData.round,
    isBank: gameData.bank,
    huType: huType,
    fanText: fanText,
    myScoreChange: isAi ? -Number(scoreText.replace("-","")) : Number(scoreText.replace("+","")),
    fullHandText: fullHandText,
    meldText: meldText
  };
  winRecordList.push(record);
  saveGame();

  let html = `
    <h2 class="win-hint text-xl text-center mb-2">${title}</h2>
    <div class="mb-1">胡牌类型：${huType}</div>
    <div class="mb-1">番型：${fanText}</div>
    <div class="mb-2">本局得分：${scoreText}</div>
    <div class="mb-1">完整胡牌手牌（橙色边框为进张）：<div style="display:flex;flex-wrap:wrap;gap:2">${handTileHtml}</div></div>
    <div class="mt-2 mb-1">副露：<div style="display:flex;flex-wrap:wrap;gap:2">${meldTileHtml}</div></div>
  `;
  showTip(html);
}
function renderTile(item,type='hand',idx=0,sel=false,ting=false,fresh=false){
  let cls = `tile-${type} tile-${item.type}`;
  if(item.type===JOKER) cls = `tile-${type} tile-joker`;
  if(sel) cls += ' tile-selected';
  if(ting) cls += ' tile-ting';
  if(fresh) cls += ' tile-hand-fresh';
  let click = type==='hand'?`onclick="clickHand(${idx})"`:'';
  return `<div class="${cls}" ${click}>${item.text}</div>`;
}
function renderMyHand(){
  let wrap = document.getElementById('my-hand');
  wrap.innerHTML = "";
  let pack = gameData.myHand.map((t,i)=>({tile:structuredClone(t),idx:i}));
  let sortedPack = pack.sort((a,b)=>{
    const ord = {wan:1,tiao:2,tong:3,joker:4};
    let o1 = ord[a.tile.type],o2=ord[b.tile.type];
    if(o1!==o2) return o1-o2;
    return a.tile.num - b.tile.num;
  });
  sortedPack.forEach(p=>{
    let isSel = gameData.selectIdx === p.idx;
    let isTing = gameData.tingList.length>0;
    let isFresh = p.idx === gameData.freshTipIdx;
    wrap.innerHTML += renderTile(p.tile,'hand',p.idx,isSel,isTing,isFresh);
  });
}
function renderOppHand(){
  let wrap = document.getElementById('opp-hand');
  wrap.innerHTML = "";
  gameData.oppHand.forEach(()=>wrap.innerHTML += `<div class="tile-hand tile-back"></div>`);
}
function renderMeld(wrapId,list){
  let wrap = document.getElementById(wrapId);
  wrap.innerHTML = "";
  list.forEach(g=>{
    g.list.forEach(t=>wrap.innerHTML += renderTile(t,'meld'));
  });
}
function renderDiscard(wrapId,list){
  let wrap = document.getElementById(wrapId);
  wrap.innerHTML = "";
  list.forEach(t=>wrap.innerHTML += renderTile(t,'discard'));
}
function updateAllUI(){
  document.getElementById('pile-count').innerText = gameData.pile.length;
  document.getElementById('last-out').innerText = gameData.lastOut?gameData.lastOut.text:'无';
  renderMyHand();renderOppHand();
  renderMeld('my-meld',gameData.myMeld);renderMeld('opp-meld',gameData.oppMeld);
  renderDiscard('my-discard',gameData.myDiscard);renderDiscard('opp-discard',gameData.oppDiscard);
  const opBtn = ['btn-eat','btn-peng','btn-minggang','btn-hu','btn-pass'];
  opBtn.forEach(id=>document.getElementById(id).classList.toggle('btn-disabled',!gameData.waitOperate));
  let hasFour = false;
  let map = {};
  gameData.myHand.forEach(t=>map[t.type+t.num]=(map[t.type+t.num]||0)+1);
  for(let k in map) if(map[k]===4){hasFour=true;break;}
  document.getElementById('btn-angang').classList.toggle('btn-disabled',!hasFour);
}
function clearWaitOperate(){
  gameData.waitOperate = false;
  gameData.lastOut = null;
  gameData.selectIdx = -1;
  gameData.canPlay = true;
  gameData.isMyTurn = true;
  if(!gameData.bank) gameData.afterDraw = true;
  document.getElementById('last-out').innerText = "无";
}

// ======================== 核心听牌/胡牌算法（仅修改拆分函数以正确识别金将/金顺/金杠） ========================

/**
 * 核心回溯：返回是否能组成 targetSets 个面子，并记录组合（用于计番）
 * cnt: { "type-num": count } 非白板牌
 * bai: 白板数量
 * targetSets: 需要组成的面子数
 * 返回：{ success: boolean, groups: [ { type: 'shun'|'ke', tiles: [tileObj] } ], usedBai: number }
 * 注：此函数仅用于计番，不影响胡牌判定。
 */
function findMeldGroups(cnt, bai, targetSets) {
    if(targetSets === 0) {
        let allEmpty = true;
        for(let k in cnt) if(cnt[k] > 0) { allEmpty = false; break; }
        if(allEmpty && bai === 0) return { success: true, groups: [], usedBai: 0 };
        return { success: false };
    }
    let keys = Object.keys(cnt).filter(k => cnt[k] > 0);
    if(keys.length === 0) {
        if(bai >= 3 * targetSets) {
            let groups = [];
            for(let i = 0; i < targetSets; i++) {
                let tiles = [];
                for(let j = 0; j < 3; j++) tiles.push({ type: 'joker', num: 0, text: '白板' });
                groups.push({ type: 'ke', tiles: tiles });
            }
            return { success: true, groups: groups, usedBai: bai };
        }
        return { success: false };
    }
    // 尝试刻子
    for(let k of keys) {
        let val = cnt[k];
        if(val >= 3) {
            let nc = {};
            for(let kk in cnt) nc[kk] = cnt[kk];
            nc[k] = val - 3;
            if(nc[k] === 0) delete nc[k];
            let res = findMeldGroups(nc, bai, targetSets - 1);
            if(res.success) {
                let [type, num] = k.split('-');
                let tiles = [];
                for(let i = 0; i < 3; i++) tiles.push({ type: type, num: Number(num), text: TILE_LIST.find(t => t.type === type && t.num === Number(num)).text });
                res.groups.unshift({ type: 'ke', tiles: tiles });
                return res;
            }
        } else {
            let need = 3 - val;
            if(need <= bai) {
                let nc = {};
                for(let kk in cnt) nc[kk] = cnt[kk];
                delete nc[k];
                let res = findMeldGroups(nc, bai - need, targetSets - 1);
                if(res.success) {
                    let [type, num] = k.split('-');
                    let tiles = [];
                    for(let i = 0; i < val; i++) tiles.push({ type: type, num: Number(num), text: TILE_LIST.find(t => t.type === type && t.num === Number(num)).text });
                    for(let i = 0; i < need; i++) tiles.push({ type: 'joker', num: 0, text: '白板' });
                    res.groups.unshift({ type: 'ke', tiles: tiles });
                    res.usedBai += need;
                    return res;
                }
            }
        }
    }
    // 尝试顺子
    const suits = ['wan','tiao','tong'];
    for(let s of suits) {
        for(let n = 1; n <= 7; n++) {
            let k1 = s + '-' + n;
            let k2 = s + '-' + (n+1);
            let k3 = s + '-' + (n+2);
            let v1 = cnt[k1] || 0;
            let v2 = cnt[k2] || 0;
            let v3 = cnt[k3] || 0;
            if(v1 + v2 + v3 === 0) continue;
            let need = 0;
            if(v1 < 1) need++;
            if(v2 < 1) need++;
            if(v3 < 1) need++;
            if(need <= bai) {
                let origCnt = {};
                for(let kk in cnt) origCnt[kk] = cnt[kk];
                let nc = {};
                for(let kk in cnt) nc[kk] = cnt[kk];
                if(v1 > 0) { nc[k1] = v1 - 1; if(nc[k1] === 0) delete nc[k1]; }
                if(v2 > 0) { nc[k2] = v2 - 1; if(nc[k2] === 0) delete nc[k2]; }
                if(v3 > 0) { nc[k3] = v3 - 1; if(nc[k3] === 0) delete nc[k3]; }
                let res = findMeldGroups(nc, bai - need, targetSets - 1);
                if(res.success) {
                    // 构造准确 tiles
                    let tiles = [];
                    for(let key of [k1, k2, k3]) {
                        let origVal = origCnt[key] || 0;
                        let newVal = nc[key] || 0;
                        let diff = origVal - newVal;
                        if(diff > 0) {
                            let [type, num] = key.split('-');
                            tiles.push({ type: type, num: Number(num), text: TILE_LIST.find(t => t.type === type && t.num === Number(num)).text });
                        } else {
                            tiles.push({ type: 'joker', num: 0, text: '白板' });
                        }
                    }
                    res.groups.unshift({ type: 'shun', tiles: tiles });
                    res.usedBai += need;
                    return res;
                }
            }
        }
    }
    return { success: false };
}

/**
 * 判断手牌是否能胡，并返回拆分方案（将牌 + 面子）
 * fullCards: 包含白板的手牌数组
 * targetSets: 需要组成的面子数（5 - 副露面数）
 * 返回：{ success: boolean, pair: [tileObj, tileObj] | null, groups: [ {type, tiles} ], usedBai: number, isSanBai: boolean }
 * 注：此函数仅用于计番，不影响胡牌判定。
 */
function findHuSplit(fullCards, targetSets) {
    let baiTotal = 0;
    let cnt = {};
    for(let c of fullCards){
        if(c.type === 'joker'){
            baiTotal++;
            continue;
        }
        const key = c.type + '-' + c.num;
        cnt[key] = (cnt[key]||0) + 1;
    }
    // 三金倒直接胡，但无拆分
    if(baiTotal >= 3) {
        return { success: true, pair: null, groups: [], usedBai: baiTotal, isSanBai: true };
    }
    // 优先尝试白板做将（金将）
    if(baiTotal >= 2){
        const leftBai = baiTotal - 2;
        const nc = {};
        for(let kk in cnt) nc[kk] = cnt[kk];
        let res = findMeldGroups(nc, leftBai, targetSets);
        if(res.success) {
            let pairTiles = [];
            for(let i = 0; i < 2; i++) pairTiles.push({ type: 'joker', num: 0, text: '白板' });
            return { success: true, pair: pairTiles, groups: res.groups, usedBai: res.usedBai + 2, isSanBai: false };
        }
    }
    // 实体牌做将
    const allKeys = Object.keys(cnt);
    for(let k of allKeys){
        let val = cnt[k];
        let useBai = Math.max(2 - val, 0);
        if(useBai > baiTotal) continue;
        const nc = {};
        for(let kk in cnt) nc[kk] = cnt[kk];
        nc[k] = Math.max(val - 2, 0);
        if(nc[k] === 0) delete nc[k];
        const leftBai = baiTotal - useBai;
        let res = findMeldGroups(nc, leftBai, targetSets);
        if(res.success) {
            let pairTiles = [];
            let [type, num] = k.split('-');
            let tileObj = TILE_LIST.find(t => t.type === type && t.num === Number(num));
            for(let i = 0; i < val; i++) pairTiles.push({ type: type, num: Number(num), text: tileObj.text });
            for(let i = 0; i < useBai; i++) pairTiles.push({ type: 'joker', num: 0, text: '白板' });
            return { success: true, pair: pairTiles, groups: res.groups, usedBai: res.usedBai + useBai, isSanBai: false };
        }
    }
    return { success: false };
}

// ======================== 以下函数（isHu, checkNormalHu, getTingList, calcFan, UI, AI等）保持完全不变 ========================

function isHu(fullCards, targetSets) {
    let result = findHuSplit(fullCards, targetSets);
    return result.success;
}

function checkNormalHu(hand, meld, addTile=null) {
    let full = structuredClone(hand);
    if(addTile) full.push(structuredClone(addTile));
    let meldCnt = meld.length;
    let targetSets = 5 - meldCnt;
    return isHu(full, targetSets);
}

function getTingList(hand, meld) {
    let meldCnt = meld.length;
    let targetSets = 5 - meldCnt;
    let res = new Set();
    for(let tile of TILE_LIST) {
        let full = structuredClone(hand);
        full.push(structuredClone(tile));
        if(isHu(full, targetSets)) {
            res.add(tile.text);
        }
    }
    return Array.from(res);
}

function calcFan(hand, meld, huTile=null, isTianHu=false, isDiHu=false, isGangHua=false){
    let tmp = structuredClone(hand);
    if(huTile) tmp.push(structuredClone(huTile));
    let meldCnt = meld.length;
    let targetSets = 5 - meldCnt;
    let split = findHuSplit(tmp, targetSets);
    if(!split.success) {
        console.warn("拆分失败，使用降级计番");
        return { score: 1, fanList: "平胡" };
    }
    let jkAll = countJoker(tmp);
    let fan = {base:1,list:["平胡"],pengpeng:false,qingyi:false,menqing:true,ganghua:false,
      gangNum:0,anGangNum:0,sanBai:jkAll===3,siBai:jkAll===4,jinJiang:false,jinShun:false,jinGang:false};
    // 检查副露中的杠是否为金杠
    meld.forEach(g=>{
        if(g.type==='minggang'||g.type==='angang') fan.gangNum++;
        if(g.type==='angang') fan.anGangNum++;
        if(g.type==='eat') fan.menqing = false;
        if(g.list.length === 4) {
            let jkInGang = g.list.filter(t => t.type === 'joker').length;
            if(jkInGang === 4) fan.jinGang = true;
        }
    });
    // 金将：将牌两张都是白板
    if(split.pair) {
        let pairJoker = split.pair.filter(t => t.type === 'joker').length;
        if(pairJoker === 2) fan.jinJiang = true;
    }
    // 金顺：面子三张都是白板
    for(let g of split.groups) {
        let jkInGroup = g.tiles.filter(t => t.type === 'joker').length;
        if(jkInGroup === 3) fan.jinShun = true;
    }
    // 清一色
    let allCard = structuredClone(tmp);
    meld.forEach(g=>allCard.push(...structuredClone(g.list)));
    let typeSet = new Set();
    allCard.forEach(t=>{if(t.type!==JOKER) typeSet.add(t.type);});
    if(typeSet.size <=1){fan.qingyi=true;fan.base+=5;fan.list.push("清一色");}
    // 碰碰胡
    let hasShun = false;
    meld.forEach(g=>{
        if(g.type==='eat') hasShun = true;
    });
    for(let g of split.groups) {
        if(g.type === 'shun') hasShun = true;
    }
    if(!hasShun){fan.pengpeng=true;fan.base+=2;fan.list.push("碰碰胡");}
    // 门清
    if(meld.length > 0) fan.menqing = false;
    if(fan.menqing){fan.base+=2;fan.list.push("门清");}
    // 三金倒、四金倒
    if(fan.sanBai){fan.base+=6;fan.list.push("三金倒");}
    if(fan.siBai){fan.base+=12;fan.list.push("四金倒");}
    // 金将、金顺、金杠加分
    if(fan.jinJiang){fan.base+=2;fan.list.push("金将");}
    if(fan.jinShun){fan.base+=2;fan.list.push("金顺");}
    if(fan.jinGang){fan.base+=2;fan.list.push("金杠");}
    // 天胡、地胡、杠上开花
    if(isTianHu){fan.base*=10;fan.list.push("天胡");}
    if(isDiHu){fan.base*=5;fan.list.push("地胡");}
    if(isGangHua){fan.ganghua=true;fan.list.push("杠上开花");}
    return {score:fan.base * gameData.lian,fanList:fan.list.join("、")};
}

// ======================== 游戏逻辑（UI、AI、事件）保持不变 ========================
function refreshTing(){
  gameData.tingList = getTingList(gameData.myHand, gameData.myMeld);
  let tipDom = document.getElementById('ting-tip');
  if(gameData.tingList.length>0){
    tipDom.innerText = `｜听：${gameData.tingList.join('、')}`;
  }else{
    tipDom.innerText = "";
  }
}
function showTingInfo(){
  if(gameData.tingList.length===0){showTip("当前无听牌");return;}
  showTip(`当前听牌：${gameData.tingList.join('、')}`);
}

function switchBank(isMyWin,isAiWin){
  if(isMyWin && gameData.bank){
    gameData.lian +=1;
    addLog(`我方庄家胡牌，连庄倍率×${gameData.lian}`);
  }else if(isAiWin && !gameData.bank){
    gameData.lian +=1;
    addLog(`AI庄家胡牌，AI连庄倍率×${gameData.lian}`);
  }else{
    gameData.bank = !gameData.bank;
    gameData.lian = 1;
    if(gameData.liuJuChouZhuang){
      addLog("流局臭庄，更换庄家，连庄重置");
    }else{
      addLog("闲家胡牌，换庄，连庄重置为1");
    }
  }
  gameData.round +=1;
  gameData.liuJuChouZhuang = false;
  updateScoreBar();
}

function initGame(){
  gameData.pile = buildPile();
  gameData.myHand = [];gameData.oppHand = [];
  gameData.myMeld = [];gameData.oppMeld = [];
  gameData.myDiscard = [];gameData.oppDiscard = [];
  gameData.waitOperate = false;gameData.gameOver = false;
  gameData.afterGang = false;gameData.tingList = [];
  gameData.firstOppOut = true;gameData.liuJuChouZhuang = false;
  gameData.freshTipIdx = -1;
  document.getElementById('game-log').innerHTML = "";
  document.getElementById('ting-tip').innerText = "";
  document.getElementById('fresh-tip').innerText = "";
  hideTip();
  for(let i=0;i<16;i++){
    gameData.myHand.push(gameData.pile.shift());
    gameData.oppHand.push(gameData.pile.shift());
  }
  if(gameData.bank){
    gameData.myHand.push(gameData.pile.shift());
  }else{
    gameData.oppHand.push(gameData.pile.shift());
  }
  let myTotal = calcAllTotal(gameData.myHand,gameData.myMeld);
  let oppTotal = calcAllTotal(gameData.oppHand,gameData.oppMeld);
  addLog(`第${gameData.round}局｜庄家：${gameData.bank?'我方':'AI'}｜我方总牌${myTotal} AI总牌${oppTotal}`);
  refreshTing();
  updateAllUI();
  if(gameData.bank){
    gameData.tianHuCheck = true;
    if(checkNormalHu(gameData.myHand,gameData.myMeld)){
      gameData.gameOver = true;
      let res = calcFan(gameData.myHand,gameData.myMeld,null,true,false,false);
      gameData.myScore += res.score;
      gameData.oppScore -= res.score;
      addLog(`🎉天胡 ${res.fanList} 得分+${res.score}`);
      showWinTip(false,`+${res.score}`,res.fanList,"天胡",null);
      setInfo("天胡胜利");
      switchBank(true,false);
      return;
    }
    gameData.isMyTurn = true;
    setInfo("你是庄家，点击手牌打出");
  }else{
    setInfo("AI庄家出牌中...");
    setTimeout(()=>aiFirstDiscard(),DELAY_OP);
  }
}
function clickHand(idx){
  if(gameData.waitOperate){showTip("请先处理吃碰杠胡");return;}
  if(!gameData.bank && !gameData.afterDraw){showTip("闲家先摸牌再出牌");return;}
  if(gameData.gameOver || !gameData.canPlay || !gameData.isMyTurn) return;
  if(gameData.selectIdx === idx){
    let out = gameData.myHand.splice(idx,1)[0];
    gameData.myDiscard.push(out);
    gameData.discardRecord.push(out.type+out.num);
    gameData.selectIdx = -1;
    gameData.canPlay = false;
    gameData.lastOut = out;
    gameData.isMyTurn = false;
    gameData.waitOperate = true;
    gameData.freshTipIdx = -1;
    document.getElementById('fresh-tip').innerText = "";
    addLog(`打出${out.text}`);
    setInfo(`打出${out.text}，等待AI操作`);
    refreshTing();
    updateAllUI();
    setTimeout(()=>{gameData.canPlay=true;oppAiLogic();},DELAY_OP);
    return;
  }
  gameData.selectIdx = idx;
  updateAllUI();
}
function actionPass(){
  if(!gameData.waitOperate) return;
  hideTip();
  clearWaitOperate();
  addLog("选择过牌，摸牌");
  drawMyTile();
}
function drawMyTile(){
  gameData.afterGang = false;
  if(gameData.pile.length <= STREAM_LIMIT){
    addLog('<span class="error-hint">牌堆见底，流局臭庄</span>');
    gameData.liuJuChouZhuang = true;
    gameData.gameOver = true;
    switchBank(false,false);
    updateScoreBar();
    return;
  }
  let newT = gameData.pile.shift();
  gameData.myHand.push(newT);
  gameData.freshTipIdx = gameData.myHand.length - 1;
  gameData.isMyTurn = true;
  gameData.selectIdx = -1;
  gameData.canPlay = true;
  addLog(`摸到${newT.text}`);
  document.getElementById('fresh-tip').innerText = `刚摸到：${newT.text}`;
  refreshTing();
  updateAllUI();
  setTimeout(()=>{
    gameData.freshTipIdx = -1;
    document.getElementById('fresh-tip').innerText = "";
    updateAllUI();
  },TIP_DURATION);
  if(getTingList(gameData.myHand, gameData.myMeld).length > 0){
    setInfo("可自摸，点击自摸按钮");
  }else{
    setInfo("摸牌完成，点击手牌打出");
  }
}
function actionHu(){
  if(!gameData.waitOperate || gameData.gameOver) return;
  let out = gameData.lastOut;
  if(!checkNormalHu(gameData.myHand,gameData.myMeld,out)){showTip("无法胡这张牌");return;}
  gameData.gameOver = true;
  let res = calcFan(gameData.myHand,gameData.myMeld,out,false,false,false);
  gameData.myScore += res.score;
  gameData.oppScore -= res.score;
  addLog(`<span class="win-hint">点炮胡 ${res.fanList} +${res.score}</span>`);
  showWinTip(false,`+${res.score}`,res.fanList,"点炮胡",out);
  setInfo("胡牌胜利");
  switchBank(true,false);
  updateAllUI();
}
function actionZiMo(){
  if(gameData.waitOperate || gameData.gameOver) return;
  if(!checkNormalHu(gameData.myHand, gameData.myMeld)) {
    showTip("当前不能自摸");
    return;
  }
  hideTip();
  gameData.gameOver = true;
  let isDiHu = !gameData.bank && gameData.firstOppOut;
  let huTypeName = gameData.afterGang ? "杠上开花自摸" : (isDiHu ? "地胡自摸" : "普通自摸");
  let ziMoTile = gameData.myHand[gameData.myHand.length-1];
  let res = calcFan(gameData.myHand, gameData.myMeld, null, false, isDiHu, gameData.afterGang);
  gameData.myScore += res.score;
  gameData.oppScore -= res.score;
  addLog(`<span class="win-hint">自摸${gameData.afterGang?'（杠上开花）':''} ${res.fanList} +${res.score}</span>`);
  showWinTip(false,`+${res.score}`,res.fanList,huTypeName,ziMoTile);
  setInfo("自摸胜利");
  switchBank(true,false);
  updateAllUI();
}
function getEatGroup(target,hand){
  if(target.type === JOKER) return [];
  let nums = hand.filter(t=>t.type===target.type).map(t=>t.num);
  let n = target.num;
  let list = [];
  if(n-2>=1 && nums.includes(n-1) && nums.includes(n-2)) list.push([n-2,n-1]);
  if(n-1>=1 && n+1<=9 && nums.includes(n-1) && nums.includes(n+1)) list.push([n-1,n+1]);
  if(n+2<=9 && nums.includes(n+1) && nums.includes(n+2)) list.push([n+1,n+2]);
  return list;
}
function doEat(nums){
  hideTip();
  let out = gameData.lastOut;
  let hand = structuredClone(gameData.myHand);
  let meldList = [structuredClone(out)];
  nums.forEach(num=>{
    let idx = hand.findIndex(t=>t.type===out.type&&t.num===num);
    meldList.unshift(hand.splice(idx,1)[0]);
  });
  gameData.myHand = hand;
  gameData.myMeld.push({type:'eat',list:meldList});
  gameData.freshTipIdx = -1;
  document.getElementById('fresh-tip').innerText = "";
  addLog(`吃牌：${meldList.map(t=>t.text).join("")}，无需摸牌，直接出牌`);
  clearWaitOperate();
  refreshTing();
  updateAllUI();
}
function actionEat(){
  if(!gameData.waitOperate) return;
  let out = gameData.lastOut;
  if(out.type === JOKER){showTip("白板不能吃");return;}
  let eatList = getEatGroup(out,gameData.myHand);
  if(eatList.length===0){showTip("无法吃这张牌");return;}
  let html = "可选吃牌组合：";
  eatList.forEach(g=>{
    let name = g.map(n=>out.type==='wan'?n+"万":out.type==='tiao'?n+"条":n+"筒").join("");
    html += `<button onclick="doEat([${g.join(',')}])" class="bg-sky-400 text-black mx-1 my-1 px-2 rounded">${name}</button>`;
  });
  showTip(html);
}
function actionPeng(){
  if(!gameData.waitOperate) return;
  let out = gameData.lastOut;
  if(out.type === JOKER){showTip("白板不能碰");return;}
  let same = gameData.myHand.filter(t=>t.type===out.type&&t.num===out.num);
  if(same.length<2){showTip("手牌不足两张，无法碰");return;}
  hideTip();
  let meldList = [structuredClone(out)];
  let cnt = 0;
  gameData.myHand = gameData.myHand.filter(t=>{
    if(t.type===out.type&&t.num===out.num && cnt<2){
      meldList.push(structuredClone(t));cnt++;return false;
    }
    return true;
  });
  gameData.myMeld.push({type:'peng',list:meldList});
  gameData.freshTipIdx = -1;
  document.getElementById('fresh-tip').innerText = "";
  addLog(`碰${out.text}，无需摸牌，直接出牌`);
  clearWaitOperate();
  refreshTing();
  updateAllUI();
}
function actionMingGang(){
  if(!gameData.waitOperate) return;
  let out = gameData.lastOut;
  if(out.type === JOKER){showTip("白板不能明杠");return;}
  let same = gameData.myHand.filter(t=>t.type===out.type&&t.num===out.num);
  if(same.length<3){showTip("手牌不足三张，无法明杠");return;}
  hideTip();
  let meldList = [structuredClone(out)];
  let cnt = 0;
  gameData.myHand = gameData.myHand.filter(t=>{
    if(t.type===out.type&&t.num===out.num && cnt<3){
      meldList.push(structuredClone(t));cnt++;return false;
    }
    return true;
  });
  gameData.myMeld.push({type:'minggang',list:meldList});
  gameData.totalMingGang += gameData.gangScore;
  saveGame();
  gameData.freshTipIdx = -1;
  document.getElementById('fresh-tip').innerText = "";
  addLog(`明杠${out.text}，摸杠补牌`);
  clearWaitOperate();
  gameData.afterGang = true;
  refreshTing();
  updateAllUI();
  drawMyTile();
}
function checkAnGang(){
    let map = {};
  gameData.myHand.forEach(t=>map[t.type+t.num]=(map[t.type+t.num]||0)+1);
  let gangKey = null;
  for(let k in map) if(map[k]===4){gangKey=k;break;}
  if(!gangKey){showTip("无四张相同牌，不能暗杠");return;}
  hideTip();
  let ty = gangKey.slice(0, -1);
  let num = Number(gangKey.slice(-1));
  let list = [];
  for (let i = 0; i < 4; i++) {
    let idx = gameData.myHand.findIndex(t => t.type === ty && t.num === num);
    list.push(gameData.myHand.splice(idx, 1)[0]);
  }
  gameData.myMeld.push({ type: 'angang', list: list });
  gameData.totalAnGang += gameData.gangScore * 2;
  saveGame();
  gameData.freshTipIdx = -1;
  document.getElementById('fresh-tip').innerText = "";
  let tileName = TILE_LIST.find(t => t.type === ty && t.num === num).text;
  addLog(`暗杠${tileName}，摸杠补牌`);
  updateAllUI();
  gameData.afterGang = true;
  refreshTing();
  drawMyTile();
}

// AI 逻辑（保持不变）
function aiGetSafe () {
let safe = [];
gameData.discardRecord.forEach (k => {
let ty = k.slice (0, -1);
let n = Number (k.slice (-1));
let find = TILE_LIST.find (t => t.type === ty && t.num === n);
if (find) safe.push (structuredClone (find));
});
return safe;
}
function aiIsQingYi (hand, meld) {
let s = new Set ();
hand.forEach (t => { if (t.type !== JOKER) s.add (t.type); });
meld.forEach (g => g.list.forEach (t => { if (t.type !== JOKER) s.add (t.type); }));
return s.size <= 1;
}
function aiIsPengPeng (hand, meld) {
let hasShun = false;
let all = structuredClone (hand);
meld.forEach (g => all.push (...structuredClone (g.list)));
let sortAll = sortHandVisual (all.filter (t => t.type !== JOKER));
for (let i = 0; i < sortAll.length - 2; i++) {
let a = sortAll [i], b = sortAll [i + 1], c = sortAll [i + 2];
if (a.type === b.type && b.type === c.type && a.num + 1 === b.num && b.num + 1 === c.num) {
hasShun = true;
break;
}
}
return !hasShun;
}
function aiScoreHand (hand, meld) {
let scoreMap = new Map ();
hand.forEach ((t, i) => scoreMap.set (i, 0));
let safeList = aiGetSafe ();
let playerTing = getTingList (gameData.myHand, gameData.myMeld);
let isQing = aiIsQingYi (hand, meld);
let isPeng = aiIsPengPeng (hand, meld);
for (let i = 0; i < hand.length; i++) {
let tile = hand [i];
let sc = 0;
if (tile.type === JOKER) {
sc = curAiWeight.jokerLock;
scoreMap.set (i, sc);
continue;
}
if (safeList.some (x => x.type === tile.type && x.num === tile.num)) sc += curAiWeight.safe;
if (tile.num === 1 || tile.num === 9) sc += curAiWeight.edge;
let cntSame = hand.filter (x => x.type === tile.type && x.num === tile.num).length;
if (cntSame === 1) sc += curAiWeight.lone;
let tempHand = structuredClone (hand);
tempHand.splice (i, 1);
if (getTingList (tempHand, meld).length < getTingList (hand, meld).length) {
sc += curAiWeight.split;
}
if (isQing) sc += curAiWeight.color;
if (isPeng) sc += curAiWeight.pengpeng;
if (playerTing.includes (tile.text)) sc += curAiWeight.danger * curAiWeight.avoidDanger;
scoreMap.set (i, sc);
}
let minIdx = 0, minVal = scoreMap.get (0);
for (let [idx, val] of scoreMap) {
if (val < minVal) {
minVal = val;
minIdx = idx;
}
}
return minIdx;
}
function aiCanEat (target, hand) {
if (target.type === JOKER) return false;
let eatList = getEatGroup (target, hand);
return eatList.length > 0 && Math.random () < curAiWeight.eatRate;
}
function aiCanMingGang (target, hand) {
if (target.type === JOKER) return false;
let same = hand.filter (t => t.type === target.type && t.num === target.num).length;
return same >= 3 && Math.random () < curAiWeight.gangRate;
}
function aiCanPeng (target, hand) {
if (target.type === JOKER) return false;
let same = hand.filter (t => t.type === target.type && t.num === target.num).length;
return same >= 2;
}
function aiFirstDiscard () {
if (gameData.gameOver) return;
let dropIdx = aiScoreHand (gameData.oppHand, gameData.oppMeld);
let out = gameData.oppHand.splice (dropIdx, 1)[0];
gameData.oppDiscard.push (out);
gameData.lastOut = out;
gameData.waitOperate = true;
gameData.firstOppOut = false;
document.getElementById ('last-out').innerText = out.text;
setInfo(`AI打出${out.text}，可吃/碰/杠/胡/过`);
addLog(`AI打出${out.text}`);
let oppTotal = calcAllTotal(gameData.oppHand, gameData.oppMeld);
addLog(`AI剩余手牌${gameData.oppHand.length}，全局总牌${oppTotal}`);
updateAllUI ();
}
function oppAiMeldPlay () {
gameData.afterGang = false;
if (gameData.pile.length <= STREAM_LIMIT) {
addLog('<span class="error-hint">牌堆见底，流局臭庄</span>');
gameData.liuJuChouZhuang = true;
gameData.gameOver = true;
switchBank(false, false);
updateScoreBar();
return;
}
let dropIdx = aiScoreHand(gameData.oppHand, gameData.oppMeld);
let out = gameData.oppHand.splice(dropIdx, 1)[0];
gameData.oppDiscard.push(out);
gameData.lastOut = out;
gameData.waitOperate = true;
gameData.firstOppOut = false;
document.getElementById('last-out').innerText = out.text;
setInfo(`AI打出${out.text}，可吃/碰/杠/胡/过`);
addLog(`AI打出${out.text}`);
let oppTotal = calcAllTotal(gameData.oppHand, gameData.oppMeld);
addLog(`AI剩余手牌${gameData.oppHand.length}，全局总牌${oppTotal}`);
updateAllUI ();
}
function oppAiNormalDraw () {
gameData.afterGang = false;
if (gameData.pile.length <= STREAM_LIMIT) {
addLog('<span class="error-hint">牌堆见底，流局臭庄</span>');
gameData.liuJuChouZhuang = true;
gameData.gameOver = true;
switchBank (false, false);
updateScoreBar ();
return;
}
let newTile = gameData.pile.shift ();
gameData.oppHand.push (newTile);
if (checkNormalHu (gameData.oppHand, gameData.oppMeld)) {
gameData.gameOver = true;
let res = calcFan (gameData.oppHand, gameData.oppMeld, null, false, false, gameData.afterGang);
let huName = gameData.afterGang ? "AI杠上开花自摸" : "AI普通自摸";
let aiZiMoCard = gameData.oppHand[gameData.oppHand.length - 1];
showWinTip (true, `-${res.score}`, res.fanList, huName, aiZiMoCard);
gameData.oppScore += res.score;
gameData.myScore -= res.score;
addLog(`<span class="win-hint">AI自摸${gameData.afterGang ? '（杠上开花）' : ''} ${res.fanList} 我方-${res.score}</span>`);
setInfo ("AI 自摸胜利");
switchBank (false, true);
updateScoreBar ();
return;
}
let dropIdx = aiScoreHand (gameData.oppHand, gameData.oppMeld);
let out = gameData.oppHand.splice (dropIdx, 1)[0];
gameData.oppDiscard.push (out);
gameData.lastOut = out;
gameData.waitOperate = true;
gameData.firstOppOut = false;
document.getElementById ('last-out').innerText = out.text;
setInfo(`AI打出${out.text}，可吃/碰/杠/胡/过`);
addLog(`AI摸牌后打出${out.text}`);
let oppTotal = calcAllTotal(gameData.oppHand, gameData.oppMeld);
addLog(`AI剩余手牌${gameData.oppHand.length}，全局总牌${oppTotal}`);
updateAllUI ();
}
function oppAiLogic () {
if (gameData.gameOver) return;
let out = gameData.lastOut;
if (checkNormalHu (gameData.myHand, gameData.myMeld, out)) {
return;
}
if (aiCanMingGang (out, gameData.oppHand)) {
let meldList = [structuredClone (out)];
let cnt = 0;
gameData.oppHand = gameData.oppHand.filter (t => {
if (t.type === out.type && t.num === out.num && cnt < 3) {
meldList.push (structuredClone (t));
cnt++;
return false;
}
return true;
});
gameData.oppMeld.push ({ type: 'minggang', list: meldList });
gameData.totalMingGang += gameData.gangScore;
saveGame ();
addLog(`AI明杠${out.text}，摸杠补牌`);
gameData.afterGang = true;
let oppTotal = calcAllTotal(gameData.oppHand, gameData.oppMeld);
addLog(`AI杠后手牌${gameData.oppHand.length}，全局总牌${oppTotal}`);
updateAllUI ();
setTimeout (() => oppAiNormalDraw (), DELAY_MELD);
return;
}
if (aiCanPeng (out, gameData.oppHand)) {
let meldList = [structuredClone (out)];
let cnt = 0;
gameData.oppHand = gameData.oppHand.filter (t => {
if (t.type === out.type && t.num === out.num && cnt < 2) {
meldList.push (structuredClone (t));
cnt++;
return false;
}
return true;
});
gameData.oppMeld.push ({ type: 'peng', list: meldList });
addLog(`AI碰${out.text}`);
let oppTotal = calcAllTotal(gameData.oppHand, gameData.oppMeld);
addLog(`AI碰后手牌${gameData.oppHand.length}，全局总牌${oppTotal}，等待出牌`);
updateAllUI ();
setTimeout (() => oppAiMeldPlay (), DELAY_MELD);
return;
}
if (aiCanEat (out, gameData.oppHand)) {
let eatGroup = getEatGroup (out, gameData.oppHand)[0];
let meldList = [structuredClone (out)];
let handCopy = structuredClone (gameData.oppHand);
eatGroup.forEach (num => {
let idx = handCopy.findIndex (t => t.type === out.type && t.num === num);
meldList.unshift (handCopy.splice (idx, 1)[0]);
});
gameData.oppHand = handCopy;
gameData.oppMeld.push ({ type: 'eat', list: meldList });
addLog(`AI吃${meldList.map(t => t.text).join("")}`);
let oppTotal = calcAllTotal(gameData.oppHand, gameData.oppMeld);
addLog(`AI吃后手牌${gameData.oppHand.length}，全局总牌${oppTotal}，等待出牌`);
updateAllUI ();
setTimeout (() => oppAiMeldPlay (), DELAY_MELD);
return;
}
clearWaitOperate ();
addLog ("AI 选择过，摸牌");
setTimeout (() => oppAiNormalDraw (), DELAY_MELD);
}

window.onload = function () {
loadGame();
updateScoreBar();
initGame();
}
