<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>智能定投 · 实时平滑止盈</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#4338ca',
        danger: '#dc2626',
        info: '#0284c7',
        profit: '#16a34a',
        loss: '#ef4444',
      }
    }
  }
}
</script>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
.trans-all { transition: all 0.2s ease; }
</style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50">
<div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-5 border border-white/50">

    <header class="mb-5 pb-2 border-b border-indigo-100">
        <h1 class="text-xl font-bold text-center text-indigo-700">📈 实时平滑止盈定投</h1>
        <p class="text-xs text-center text-slate-400 mt-0.5">输入即更新 · 拒绝跳跃式减仓</p>
    </header>

    <!-- 输入区域 -->
    <div class="space-y-4">
        <!-- 持仓 -->
        <div class="bg-slate-50/80 rounded-xl p-4 border border-indigo-100/50">
            <h2 class="text-sm font-semibold text-indigo-700 mb-3 flex items-center gap-2">
                <span class="w-5 h-5 flex items-center justify-center bg-indigo-600 text-white rounded-full text-[10px]">1</span>
                组合持仓
            </h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">📊 总市值 (元)</label>
                    <input id="holdMoney" type="number" step="0.01" placeholder="例如 68000"
                    class="w-full border border-indigo-200 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-indigo-300 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">📈 浮动盈亏 (元) <span class="text-red-400">(亏损填负)</span></label>
                    <input id="totalProfit" type="number" step="0.01" placeholder="例如 -5000 或 12000"
                    class="w-full border border-indigo-200 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-indigo-300 outline-none">
                </div>
            </div>
        </div>

        <!-- 估值 -->
        <div class="bg-purple-50/80 rounded-xl p-4 border border-purple-100/50">
            <h2 class="text-sm font-semibold text-purple-700 mb-3 flex items-center gap-2">
                <span class="w-5 h-5 flex items-center justify-center bg-purple-600 text-white rounded-full text-[10px]">2</span>
                市场估值分位 (PE/PB)
            </h2>
            <div class="flex items-center gap-4 px-1">
                <input id="valuationRange" type="range" min="0" max="100" value="50" 
                class="w-full h-1.5 bg-purple-200 rounded-lg appearance-none cursor-pointer accent-purple-600">
                <span id="valuationDisplay" class="font-bold text-purple-700 text-base w-12 text-center bg-white rounded-lg py-0.5 border border-purple-200">50%</span>
            </div>
            <div class="flex justify-between text-[10px] text-slate-500 px-1 mt-1">
                <span class="font-medium text-emerald-600">📉 低估 (&lt;30%)</span>
                <span class="font-medium text-amber-500">⚖️ 合理 (30%-70%)</span>
                <span class="font-medium text-rose-500">📈 高估 (&gt;70%)</span>
            </div>
        </div>
    </div>

    <!-- 按钮（保留作为手动刷新） -->
    <div class="grid grid-cols-2 gap-3 mt-5 mb-4">
        <button onclick="calcAction()" 
        class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:scale-[1.02] text-white py-2.5 rounded-xl font-semibold text-sm shadow-md active:scale-[0.97] trans-all">
            🔄 手动刷新
        </button>
        <button onclick="resetForm()" 
        class="bg-gradient-to-r from-slate-400 to-slate-500 hover:scale-[1.02] text-white py-2.5 rounded-xl font-semibold text-sm shadow-md active:scale-[0.97] trans-all">
            🔄 重置
        </button>
    </div>

    <!-- 结果面板（实时更新） -->
    <section id="resultBox" class="p-4 rounded-xl hidden mb-4 text-sm border trans-all"></section>

    <!-- 规则 -->
    <details class="bg-slate-50 rounded-xl p-3 text-xs border border-slate-200">
        <summary class="font-semibold text-slate-600 cursor-pointer select-none">📜 平滑止盈曲线说明</summary>
        <div class="mt-2 text-slate-600 space-y-1.5 leading-relaxed">
            <p>🔹 <span class="font-bold text-indigo-600">低估区</span>：止盈比例×0.6（便宜就多捂捂）</p>
            <p>🔹 <span class="font-bold text-amber-600">合理区</span>：收益越高，止盈比例连续递增（0%~90%）</p>
            <p>🔹 <span class="font-bold text-rose-600">高估区</span>：止盈比例×1.3（贵了就多兑现）</p>
            <p class="mt-1 text-slate-400">* 最终保留至少8%~10%底仓，避免完全踏空</p>
        </div>
    </details>
</div>

<script>
// 千分位
function formatMoney(num) {
    if (!num && num !== 0) return '0.00';
    const fixed = Number(num).toFixed(2);
    if (fixed.startsWith('-')) return '-' + fixed.slice(1).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return fixed.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// ★★★ 核心：平滑止盈计算函数 ★★★
function calcSmoothTakeProfit(rate, valLevel) {
    let base = 0;
    if (rate <= 0) {
        base = 0;
    } else if (rate > 0 && rate <= 15) {
        base = (rate / 15) * 10;
    } else if (rate > 15 && rate <= 35) {
        base = 10 + ((rate - 15) / 20) * 45;
    } else if (rate > 35 && rate <= 60) {
        base = 55 + ((rate - 35) / 25) * 30;
    } else {
        base = 85 + Math.min(7, (rate - 60) * 0.5);
    }
    base = Math.min(92, base);

    let final = base;
    if (valLevel === '低估') {
        final = base * 0.6;
    } else if (valLevel === '高估') {
        final = Math.min(95, base * 1.3);
    }
    if (rate <= 0) final = 0;
    return Math.round(final * 100) / 100;
}

// 主测算函数（可被自动调用）
function calcAction(){
    const holdInput = document.getElementById('holdMoney').value.trim();
    const profitInput = document.getElementById('totalProfit').value.trim();
    const valuation = parseFloat(document.getElementById('valuationRange').value);
    const box = document.getElementById('resultBox');

    // --- 数据完整性检查（温和提示） ---
    if (!holdInput || !profitInput) {
        box.classList.remove('hidden');
        box.className = 'p-4 rounded-xl bg-slate-100 text-slate-500 border border-slate-200 text-center';
        box.innerHTML = `📝 请填写完整的持仓市值和浮动盈亏数据`;
        return;
    }

    const holdMoney = parseFloat(holdInput);
    const totalProfit = parseFloat(profitInput);
    if (isNaN(holdMoney) || isNaN(totalProfit) || holdMoney <= 0) {
        box.classList.remove('hidden');
        box.className = 'p-4 rounded-xl bg-amber-50 text-amber-700 border border-amber-200';
        box.innerHTML = `⚠️ 请确保市值是正数，盈亏为有效数字`;
        return;
    }

    const totalCapital = holdMoney - totalProfit;
    if (Math.abs(totalCapital) < 0.01) {
        box.classList.remove('hidden');
        box.className = 'p-4 rounded-xl bg-amber-50 text-amber-700 border border-amber-200';
        box.innerHTML = `⚠️ 本金趋近于0，无法计算收益率`;
        return;
    }

    // --- 正式计算 ---
    const rate = Number(((totalProfit / totalCapital) * 100).toFixed(2));
    let valLevel = '';
    let valTag = '';
    if (valuation < 30) { valLevel = '低估'; valTag = '📉 低估区'; }
    else if (valuation <= 70) { valLevel = '合理'; valTag = '⚖️ 合理区'; }
    else { valLevel = '高估'; valTag = '📈 高估区'; }

    const takeProfitRatio = calcSmoothTakeProfit(rate, valLevel);
    const takeProfitAmount = (holdMoney * takeProfitRatio) / 100;

    // 定投建议
    let investAdvice = '';
    let bgClass = '';
    let rateColor = '';

    if (valLevel === '低估') {
        rateColor = 'text-emerald-600';
        if (rate <= -30) investAdvice = '🔥 低估+深亏：建议【加倍定投】，大胆分批吸筹。';
        else investAdvice = '🌱 低估区间：建议【维持或加大定投】，珍惜便宜筹码。';
        bgClass = 'bg-emerald-50 border-emerald-200 text-emerald-800';
    } 
    else if (valLevel === '合理') {
        if (rate <= -30) { investAdvice = '📉 合理区深亏：建议【加倍定投】拉低成本。'; rateColor = 'text-blue-600'; }
        else if (rate > -30 && rate < 30) { investAdvice = '⚖️ 窄幅震荡：建议【维持原定投】。'; rateColor = 'text-slate-600'; }
        else { investAdvice = '📈 合理区盈利：建议【正常定投】，结合平滑止盈减仓。'; rateColor = 'text-amber-600'; }
        bgClass = 'bg-slate-50 border-slate-200 text-slate-700';
    } 
    else { // 高估
        rateColor = 'text-rose-600';
        if (rate < 0) investAdvice = '🚨 高估区亏损（追高）：建议【暂停定投】，绝不补仓。';
        else if (rate < 20) investAdvice = '⚠️ 高估区微利：建议【定投减半】，加大止盈力度。';
        else investAdvice = '📉 高估区高收益：建议【暂停定投】，大量止盈落袋。';
        bgClass = 'bg-rose-50 border-rose-200 text-rose-800';
    }

    // 渲染结果
    box.classList.remove('hidden');
    box.className = `p-4 rounded-xl border ${bgClass}`;
    box.innerHTML = `
        <div class="font-bold border-b border-black/10 pb-1.5 mb-2.5 flex justify-between">
            <span>📋 测算结果</span>
            <span class="text-xs bg-white/40 px-2 py-0.5 rounded-full">估值 ${valuation}%</span>
        </div>
        <div class="grid grid-cols-2 gap-1 text-sm">
            <p>总市值：<span class="font-mono font-bold">${formatMoney(holdMoney)}</span></p>
            <p>总本金：<span class="font-mono font-bold">${formatMoney(totalCapital)}</span></p>
            <p class="col-span-2">收益率：<span class="font-mono font-bold ${rate >=0 ? 'text-emerald-600' : 'text-red-500'}">${rate.toFixed(2)}%</span></p>
        </div>

        <div class="mt-3 bg-white/50 rounded-lg p-2.5 border border-black/5">
            <div class="flex justify-between text-xs font-medium">
                <span>💸 平滑止盈曲线</span>
                <span class="text-indigo-700">建议止盈 <strong>${takeProfitRatio.toFixed(1)}%</strong> 仓位</span>
            </div>
            <div class="w-full h-2.5 bg-slate-200 rounded-full mt-1 overflow-hidden">
                <div class="h-full bg-gradient-to-r from-indigo-400 to-purple-500 rounded-full transition-all duration-300" style="width: ${takeProfitRatio}%;"></div>
            </div>
            <div class="flex justify-between text-[10px] text-slate-400 mt-0.5">
                <span>0%</span>
                <span>止盈比例 (连续平滑)</span>
                <span>${takeProfitRatio > 80 ? '92%' : '100%'}</span>
            </div>
            ${takeProfitRatio > 0 ? `<p class="text-xs text-slate-500 mt-1.5">💰 对应金额 ≈ ${formatMoney(takeProfitAmount)} 元</p>` : ''}
        </div>

        <hr class="my-2.5 border-black/10">
        <div class="font-semibold text-sm leading-relaxed">
            💡 定投策略：<span class="font-normal">${investAdvice}</span>
        </div>
        <div class="text-[11px] text-slate-400 mt-1.5 border-t border-black/5 pt-1.5">
            ⚡ 止盈比例随收益率连续变化，拒绝跳跃式减仓，保留底仓应对长牛。
        </div>
    `;
}

// --- 自动绑定实时事件 ---
document.addEventListener('DOMContentLoaded', function() {
    const slider = document.getElementById('valuationRange');
    const display = document.getElementById('valuationDisplay');
    // 滑块实时更新数字
    slider.addEventListener('input', function() {
        display.textContent = this.value + '%';
        calcAction(); // 自动触发计算
    });

    // 输入框实时触发
    const holdInput = document.getElementById('holdMoney');
    const profitInput = document.getElementById('totalProfit');
    holdInput.addEventListener('input', calcAction);
    profitInput.addEventListener('input', calcAction);

    // 初始时，如果存在示例数据？留空，但可触发一次显示提示
    calcAction(); // 页面加载后显示“请填写完整数据”
});

// 重置函数
function resetForm(){
    document.getElementById('holdMoney').value = '';
    document.getElementById('totalProfit').value = '';
    document.getElementById('valuationRange').value = '50';
    document.getElementById('valuationDisplay').textContent = '50%';
    // 清空结果并显示提示
    const box = document.getElementById('resultBox');
    box.classList.remove('hidden');
    box.className = 'p-4 rounded-xl bg-slate-100 text-slate-500 border border-slate-200 text-center';
    box.innerHTML = `📝 请填写完整的持仓市值和浮动盈亏数据`;
}
</script>
</body>
</html>
